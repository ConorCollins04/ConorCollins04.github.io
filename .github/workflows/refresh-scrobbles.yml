name: Refresh Last.fm cache

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch new scrobbles and rebuild cache
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python3 album-recommendations/fetch_scrobbles.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add album-recommendations/scrobbles.json album-recommendations/lastfm-cache.js
          git diff --cached --quiet || git commit -m "chore: refresh Last.fm scrobble cache"
          git push
