<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Shows — Conor Collins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f1f8;
      --surface:       #faf9fd;
      --border:        rgba(80,60,120,0.1);
      --text:          #1a1624;
      --muted:         #6b6278;
      --faint:         #b0a8be;
      --slab: 'Alfa Slab One', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 10vw 100px;
    }

    .page-header {
      margin-bottom: 36px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 4px;
    }

    /* ── Group section ── */
    .group-section {
      margin-bottom: 40px;
    }

    .group-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .group-title {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .group-count {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--faint);
    }

    /* ── Show row ── */
    .show-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 0 20px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }

    .show-row:last-child { border-bottom: none; }

    .show-date {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      padding-top: 2px;
      white-space: nowrap;
    }

    .show-main { min-width: 0; }

    .show-primary {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .show-secondary {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 1px;
    }

    .show-detail {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.03em;
      color: var(--faint);
      margin-top: 4px;
      line-height: 1.5;
    }

    .tag {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    .ood-label {
      letter-spacing: 0.03em;
      margin-right: 4px;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Drag Shows</h1>
    <p class="page-subtitle" id="subtitle">Loading…</p>
  </div>

  <div id="shows-view"></div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <div class="nav-group" id="survivor-group">
      <button class="nav-btn" id="survivor-trigger">Survivor</button>
      <div class="nav-flyout" id="survivor-flyout">
        <a href="survivor-all-stars.html" class="nav-sub-btn">All-Stars Casting</a>
        <a href="survivor-moments.html" class="nav-sub-btn">Moments</a>
      </div>
    </div>
    <a href="oscars.html" class="nav-btn">Oscars</a>
    <a href="concerts.html" class="nav-btn">Concerts</a>
    <div class="nav-group" id="drag-group">
      <button class="nav-btn active" id="drag-trigger">Drag</button>
      <div class="nav-flyout" id="drag-flyout">
        <a href="drag-race.html" class="nav-sub-btn">Drag Race</a>
        <a href="drag-shows.html" class="nav-sub-btn active">Live Shows</a>
      </div>
    </div>
  </nav>
</div>

<script src="drag-shows-data.js"></script>
<script>
  function formatShortDate(dateStr) {
    const [, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}`;
  }

  function getYear(dateStr) { return dateStr.split("-")[0]; }

  function buildRow(show) {
    const row = document.createElement("div");
    row.className = "show-row";

    const dateEl = document.createElement("div");
    dateEl.className = "show-date";
    dateEl.textContent = formatShortDate(show.date);

    const main = document.createElement("div");
    main.className = "show-main";

    // Primary: the queens (headliners or flat performers)
    const headliners = show.headliners || [];
    const performers = show.performers || [];
    const primaryQueens = headliners.length > 0 ? headliners : performers;

    const primary = document.createElement("div");
    primary.className = "show-primary";
    primary.textContent = primaryQueens.length > 0 ? primaryQueens.join(", ") : show.venue;
    main.appendChild(primary);

    // Secondary: event name (if any) + venue + city
    const secondaryParts = [];
    if (show.event) secondaryParts.push(show.event);
    secondaryParts.push(show.venue);

    const secondary = document.createElement("div");
    secondary.className = "show-secondary";
    secondary.textContent = secondaryParts.join(" · ");
    main.appendChild(secondary);

    // Support queens
    if ((show.support || []).length > 0) {
      const sup = document.createElement("div");
      sup.className = "show-detail";
      sup.innerHTML = `<span class="tag">w/</span>${show.support.join(", ")}`;
      main.appendChild(sup);
    }

    // Friends pulled on stage out of drag
    if ((show.outOfDrag || []).length > 0) {
      const ood = document.createElement("div");
      ood.className = "show-detail";
      ood.innerHTML = `<span class="ood-label">Out of drag:</span>${show.outOfDrag.join(", ")}`;
      main.appendChild(ood);
    }

    row.appendChild(dateEl);
    row.appendChild(main);
    return row;
  }

  function render() {
    const container = document.getElementById("shows-view");

    if (!DRAG_SHOWS || DRAG_SHOWS.length === 0) {
      container.innerHTML = '<div style="font-family:var(--mono);font-size:0.7rem;color:var(--faint);letter-spacing:0.04em;padding:48px 0">No shows yet — add entries to drag-shows-data.js</div>';
      return;
    }

    const sorted = [...DRAG_SHOWS].sort((a, b) => b.date.localeCompare(a.date));

    // Group by year
    const byYear = new Map();
    for (const show of sorted) {
      const y = getYear(show.date);
      if (!byYear.has(y)) byYear.set(y, []);
      byYear.get(y).push(show);
    }

    for (const [year, shows] of [...byYear.entries()].sort((a, b) => b[0] - a[0])) {
      const section = document.createElement("div");
      section.className = "group-section";

      const header = document.createElement("div");
      header.className = "group-header";

      const titleEl = document.createElement("div");
      titleEl.className = "group-title";
      titleEl.textContent = year;

      const countEl = document.createElement("div");
      countEl.className = "group-count";
      countEl.textContent = shows.length === 1 ? "1 show" : `${shows.length} shows`;

      header.appendChild(titleEl);
      header.appendChild(countEl);
      section.appendChild(header);

      for (const show of shows) section.appendChild(buildRow(show));

      container.appendChild(section);
    }
  }

  function updateSubtitle() {
    const total = DRAG_SHOWS ? DRAG_SHOWS.length : 0;
    if (total === 0) { document.getElementById("subtitle").textContent = ""; return; }
    const queens = new Set();
    for (const s of DRAG_SHOWS) {
      for (const q of [...(s.headliners||[]), ...(s.support||[]), ...(s.performers||[])]) queens.add(q);
    }
    document.getElementById("subtitle").textContent =
      `${total} show${total !== 1 ? "s" : ""} · ${queens.size} drag artist${queens.size !== 1 ? "s" : ""}`;
  }

  updateSubtitle();
  render();
</script>
<script>
  (function() {
    var g = document.getElementById('survivor-group');
    var t = document.getElementById('survivor-trigger');
    var f = document.getElementById('survivor-flyout');
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); document.getElementById('drag-flyout').classList.remove('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();
  (function() {
    var g = document.getElementById('drag-group');
    var t = document.getElementById('drag-trigger');
    var f = document.getElementById('drag-flyout');
    f.classList.add('open');
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); document.getElementById('survivor-flyout').classList.remove('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();
</script>
</body>
</html>
