<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Shows — Conor Collins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f1f8;
      --surface:       #faf9fd;
      --surface2:      #f0eef6;
      --border:        rgba(80,60,120,0.1);
      --border-hover:  rgba(80,60,120,0.28);
      --text:          #1a1624;
      --muted:         #6b6278;
      --faint:         #b0a8be;
      --nav-bg:        #1a1624;
      --nav-muted:     rgba(243,241,248,0.38);
      --nav-active-bg:   #f3f1f8;
      --nav-active-text: #1a1624;
      --slab: 'Alfa Slab One', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Page layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 10vw 100px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .view-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .view-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .view-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Empty state ── */
    .empty-state {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.04em;
      padding: 48px 0;
    }

    /* ── Group section ── */
    .group-section {
      margin-bottom: 40px;
    }

    .group-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .group-title {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .group-count {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--faint);
    }

    /* ── Show row ── */
    .show-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 0 20px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }

    .show-row:last-child { border-bottom: none; }

    .show-date {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      padding-top: 2px;
      white-space: nowrap;
    }

    .show-main { min-width: 0; }

    .show-primary {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .show-secondary {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 1px;
    }

    .show-queens {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.03em;
      color: var(--faint);
      margin-top: 4px;
      line-height: 1.5;
    }

    .show-role {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      margin-top: 3px;
    }

    .tag {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    /* ── Secondary sort ── */
    .secondary-sort-toggle {
      margin-bottom: 20px;
    }

    /* ── Support toggle ── */
    .support-toggle {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 0 48px;
      display: block;
      transition: color 0.12s;
    }
    .support-toggle:hover { color: var(--muted); }

    /* ── Stats view ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
    }

    .stat-card.full-width  { grid-column: span 4; }
    .stat-card.half-width  { grid-column: span 2; }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 10px;
    }

    .stat-number {
      font-family: var(--slab);
      font-size: 2.4rem;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-names {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .stat-sub {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      margin-top: 5px;
    }

    .stat-city-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .stat-city-row:last-child { border-bottom: none; }
    .stat-city-name { font-weight: 400; color: var(--text); }
    .stat-city-count { font-family: var(--mono); font-size: 0.62rem; color: var(--faint); }

    .stat-vbar-chart {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      margin-top: 4px;
    }
    .stat-vbar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-vbar-bar {
      width: 100%;
      background: var(--text);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
    }
    .stat-vbar-count {
      font-family: var(--mono);
      font-size: 0.52rem;
      color: var(--faint);
      min-height: 0.8rem;
    }
    .stat-vbar-label {
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    /* ── Floating nav ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--nav-bg);
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--nav-muted);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      font-weight: 500;
    }

    .nav-group { position: relative; }

    .nav-flyout {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--nav-bg);
      border-radius: 12px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
      min-width: max-content;
    }

    .nav-flyout.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .nav-sub-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--nav-muted);
      background: none;
      border: none;
      border-radius: 8px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      display: block;
    }

    .nav-sub-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-sub-btn.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Drag Shows</h1>
      <p class="page-subtitle" id="subtitle">Loading…</p>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="diary">Diary</button>
      <button class="view-btn" data-view="queens">Queens</button>
      <button class="view-btn" data-view="stats">Stats</button>
    </div>
  </div>

  <div id="secondary-sort-wrap" style="display:none; margin-bottom: 20px;">
    <div class="view-toggle">
      <button class="view-btn active" data-sort="alpha">A–Z</button>
      <button class="view-btn" data-sort="count">Most shows</button>
    </div>
  </div>

  <div id="shows-view"></div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <div class="nav-group" id="survivor-group">
      <button class="nav-btn" id="survivor-trigger">Survivor</button>
      <div class="nav-flyout" id="survivor-flyout">
        <a href="survivor-all-stars.html" class="nav-sub-btn">All-Stars Casting</a>
        <a href="survivor-moments.html" class="nav-sub-btn">Moments</a>
      </div>
    </div>
    <a href="oscars.html" class="nav-btn">Oscars</a>
    <a href="concerts.html" class="nav-btn">Concerts</a>
    <div class="nav-group" id="drag-group">
      <button class="nav-btn active" id="drag-trigger">Drag</button>
      <div class="nav-flyout" id="drag-flyout">
        <a href="drag-race.html" class="nav-sub-btn">Drag Race</a>
        <a href="drag-shows.html" class="nav-sub-btn active">Live Shows</a>
      </div>
    </div>
  </nav>
</div>

<script src="drag-shows-data.js"></script>
<script>
  let currentView = "diary";
  let secondarySort = "alpha";

  // ── Helpers ──────────────────────────────────────────────────────────────

  function formatShortDate(dateStr) {
    const [, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}`;
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}, ${y}`;
  }

  function getYear(dateStr) { return dateStr.split("-")[0]; }

  function groupBy(arr, keyFn) {
    const map = new Map();
    for (const item of arr) {
      const k = keyFn(item);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(item);
    }
    return map;
  }

  function sortedByDate(arr, desc = false) {
    return [...arr].sort((a, b) => desc
      ? b.date.localeCompare(a.date)
      : a.date.localeCompare(b.date));
  }

  // All queens in a show (excl. outOfDrag)
  function showQueens(show) {
    return [
      ...(show.headliners || []),
      ...(show.support    || []),
      ...(show.performers || []),
    ];
  }

  // Display name for a show's primary line in diary view
  function showPrimary(show) {
    if (show.event) return show.event;
    const qs = showQueens(show);
    return qs.length > 0 ? qs.join(", ") : show.venue;
  }

  // ── Row builders ──────────────────────────────────────────────────────────

  function buildDiaryRow(show) {
    const row = document.createElement("div");
    row.className = "show-row";

    const dateEl = document.createElement("div");
    dateEl.className = "show-date";
    dateEl.textContent = formatShortDate(show.date);

    const main = document.createElement("div");
    main.className = "show-main";

    const primary = document.createElement("div");
    primary.className = "show-primary";
    primary.textContent = showPrimary(show);
    main.appendChild(primary);

    const secondary = document.createElement("div");
    secondary.className = "show-secondary";
    secondary.textContent = show.venue + (show.city ? ` · ${show.city}` : "");
    main.appendChild(secondary);

    // Support line (only if show has both headliners and support)
    if ((show.headliners || []).length > 0 && (show.support || []).length > 0) {
      const sup = document.createElement("div");
      sup.className = "show-queens";
      sup.innerHTML = `<span class="tag">w/</span>${show.support.join(", ")}`;
      main.appendChild(sup);
    }

    // Out of drag
    if ((show.outOfDrag || []).length > 0) {
      const ood = document.createElement("div");
      ood.className = "show-queens";
      ood.innerHTML = `<span class="tag">pulled up</span>${show.outOfDrag.join(", ")}`;
      main.appendChild(ood);
    }

    row.appendChild(dateEl);
    row.appendChild(main);
    return row;
  }

  function buildQueenRow(show, role) {
    // role: "headliner" | "support" | "performer"
    const row = document.createElement("div");
    row.className = "show-row";

    const dateEl = document.createElement("div");
    dateEl.className = "show-date";
    dateEl.textContent = formatDate(show.date);

    const main = document.createElement("div");
    main.className = "show-main";

    const primary = document.createElement("div");
    primary.className = "show-primary";
    primary.textContent = show.event || show.venue;
    main.appendChild(primary);

    if (show.city) {
      const city = document.createElement("div");
      city.className = "show-secondary";
      city.textContent = show.city;
      main.appendChild(city);
    }

    if (role === "support") {
      const roleEl = document.createElement("div");
      roleEl.className = "show-role";
      const headliners = show.headliners || [];
      roleEl.textContent = headliners.length > 0
        ? `support for ${headliners.join(", ")}`
        : `support`;
      main.appendChild(roleEl);
    }

    row.appendChild(dateEl);
    row.appendChild(main);
    return row;
  }

  // ── Section builder ───────────────────────────────────────────────────────

  function buildSection(title, entries, rowBuilder) {
    const section = document.createElement("div");
    section.className = "group-section";

    const header = document.createElement("div");
    header.className = "group-header";

    const titleEl = document.createElement("div");
    titleEl.className = "group-title";
    titleEl.textContent = title;

    const countEl = document.createElement("div");
    countEl.className = "group-count";
    countEl.textContent = entries.length === 1 ? "1 show" : `${entries.length} shows`;

    header.appendChild(titleEl);
    header.appendChild(countEl);
    section.appendChild(header);

    for (const entry of entries) {
      section.appendChild(rowBuilder(entry));
    }

    return section;
  }

  // ── Stats ─────────────────────────────────────────────────────────────────

  function renderStats() {
    const container = document.getElementById("shows-view");
    container.innerHTML = "";

    // Queen counts
    const allQueenCount = new Map();
    const headlinerCount = new Map();
    const add = (map, name) => map.set(name, (map.get(name) || 0) + 1);

    for (const show of DRAG_SHOWS) {
      for (const q of (show.headliners || [])) { add(allQueenCount, q); add(headlinerCount, q); }
      for (const q of (show.support    || [])) { add(allQueenCount, q); }
      for (const q of (show.performers || [])) { add(allQueenCount, q); add(headlinerCount, q); }
    }

    const maxSeen = allQueenCount.size ? Math.max(...allQueenCount.values()) : 0;
    const topSeen = [...allQueenCount.entries()].filter(([,c]) => c === maxSeen).map(([n]) => n).sort();

    const maxHL = headlinerCount.size ? Math.max(...headlinerCount.values()) : 0;
    const topHL = [...headlinerCount.entries()].filter(([,c]) => c === maxHL).map(([n]) => n).sort();

    // Venue counts
    const venueCount = new Map();
    for (const show of DRAG_SHOWS) {
      add(venueCount, show.venue);
    }
    const maxVenue = venueCount.size ? Math.max(...venueCount.values()) : 0;
    const topVenues = [...venueCount.entries()].filter(([,c]) => c === maxVenue).map(([n]) => n).sort();

    // City counts
    const cityCount = new Map();
    for (const show of DRAG_SHOWS) {
      if (show.city) add(cityCount, show.city);
    }
    const cities = [...cityCount.entries()].sort((a, b) => b[1] - a[1]);

    // Shows by year
    const yearCount = new Map();
    for (const show of DRAG_SHOWS) {
      add(yearCount, getYear(show.date));
    }
    const years = [...yearCount.keys()].sort();

    // Unique queens seen
    const allQueens = allQueenCount.size;

    // Build grid
    const grid = document.createElement("div");
    grid.className = "stats-grid";

    function makeCard(label, number, names, sub, spanClass = "") {
      const card = document.createElement("div");
      card.className = "stat-card" + (spanClass ? " " + spanClass : "");
      const lEl = document.createElement("div");
      lEl.className = "stat-label";
      lEl.textContent = label;
      const nEl = document.createElement("div");
      nEl.className = "stat-number";
      nEl.textContent = number;
      card.appendChild(lEl);
      card.appendChild(nEl);
      if (names) {
        const namesEl = document.createElement("div");
        namesEl.className = "stat-names";
        namesEl.textContent = names;
        card.appendChild(namesEl);
      }
      if (sub) {
        const subEl = document.createElement("div");
        subEl.className = "stat-sub";
        subEl.textContent = sub;
        card.appendChild(subEl);
      }
      return card;
    }

    function makeVBarCard(label, data, spanClass = "") {
      const card = document.createElement("div");
      card.className = "stat-card" + (spanClass ? " " + spanClass : "");
      const lEl = document.createElement("div");
      lEl.className = "stat-label";
      lEl.textContent = label;
      card.appendChild(lEl);
      const maxVal = Math.max(...data.map(d => d.count), 1);
      const BAR_MAX_PX = 64;
      const chart = document.createElement("div");
      chart.className = "stat-vbar-chart";
      for (const { name, count } of data) {
        const col = document.createElement("div");
        col.className = "stat-vbar-col";
        const countEl = document.createElement("div");
        countEl.className = "stat-vbar-count";
        countEl.textContent = count > 0 ? count : "";
        const bar = document.createElement("div");
        bar.className = "stat-vbar-bar";
        bar.style.height = `${Math.max(2, Math.round((count / maxVal) * BAR_MAX_PX))}px`;
        if (count === 0) bar.style.opacity = "0.15";
        const lbl = document.createElement("div");
        lbl.className = "stat-vbar-label";
        lbl.textContent = name;
        col.appendChild(countEl);
        col.appendChild(bar);
        col.appendChild(lbl);
        chart.appendChild(col);
      }
      card.appendChild(chart);
      return card;
    }

    grid.appendChild(makeCard("Queens seen", allQueens, null, null, "half-width"));
    grid.appendChild(makeCard("Shows attended", DRAG_SHOWS.length, null, null, "half-width"));
    grid.appendChild(makeCard("Most seen queen", maxSeen, topSeen.join(", "), null, "half-width"));
    grid.appendChild(makeCard("Most seen headliner", maxHL, topHL.join(", "), null, "half-width"));
    grid.appendChild(makeCard("Most visited venue", maxVenue, topVenues.join(", "), null, "half-width"));

    if (cities.length > 0) {
      const cityCard = document.createElement("div");
      cityCard.className = "stat-card half-width";
      const cLabel = document.createElement("div");
      cLabel.className = "stat-label";
      cLabel.textContent = "Shows by city";
      cityCard.appendChild(cLabel);
      for (const [city, count] of cities) {
        const r = document.createElement("div");
        r.className = "stat-city-row";
        const n = document.createElement("span");
        n.className = "stat-city-name";
        n.textContent = city;
        const c = document.createElement("span");
        c.className = "stat-city-count";
        c.textContent = count;
        r.appendChild(n);
        r.appendChild(c);
        cityCard.appendChild(r);
      }
      grid.appendChild(cityCard);
    }

    if (years.length > 1) {
      const yearData = years.map(y => ({ name: `'${y.slice(2)}`, count: yearCount.get(y) }));
      grid.appendChild(makeVBarCard("Shows by year", yearData, "full-width"));
    }

    container.appendChild(grid);
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render() {
    const container = document.getElementById("shows-view");
    container.innerHTML = "";

    if (currentView === "stats") { renderStats(); return; }

    if (!DRAG_SHOWS || DRAG_SHOWS.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No shows yet — add entries to drag-shows-data.js";
      container.appendChild(empty);
      return;
    }

    const sorted = sortedByDate(DRAG_SHOWS, true);

    if (currentView === "diary") {
      const byYear = groupBy(sorted, s => getYear(s.date));
      const years = [...byYear.keys()].sort((a, b) => b - a);
      for (const year of years) {
        const shows = byYear.get(year);
        container.appendChild(buildSection(year, shows, buildDiaryRow));
      }

    } else {
      // Queens view
      const byQueen = new Map();
      const addEntry = (name, entry) => {
        if (!byQueen.has(name)) byQueen.set(name, []);
        byQueen.get(name).push(entry);
      };

      for (const show of DRAG_SHOWS) {
        for (const q of (show.headliners || [])) addEntry(q, { show, role: "headliner" });
        for (const q of (show.support    || [])) addEntry(q, { show, role: "support"   });
        for (const q of (show.performers || [])) addEntry(q, { show, role: "performer" });
      }

      const countFor = (queen) => byQueen.get(queen).length;

      const allQueens = [...byQueen.keys()].sort((a, b) => secondarySort === "count"
        ? countFor(b) - countFor(a) || a.localeCompare(b)
        : a.localeCompare(b));

      // Queens who have headlined or performed (flat) at least once
      const featured  = allQueens.filter(q => byQueen.get(q).some(e => e.role !== "support"));
      // Queens who only ever appeared as support
      const supportOnly = allQueens.filter(q => byQueen.get(q).every(e => e.role === "support"));

      for (const queen of featured) {
        const entries = byQueen.get(queen).sort((a, b) => b.show.date.localeCompare(a.show.date));
        container.appendChild(buildSection(
          queen,
          entries,
          ({ show, role }) => buildQueenRow(show, role)
        ));
      }

      if (supportOnly.length > 0) {
        const supportWrap = document.createElement("div");
        supportWrap.style.display = "none";
        for (const queen of supportOnly) {
          const entries = byQueen.get(queen).sort((a, b) => b.show.date.localeCompare(a.show.date));
          supportWrap.appendChild(buildSection(
            queen,
            entries,
            ({ show, role }) => buildQueenRow(show, role)
          ));
        }
        container.appendChild(supportWrap);

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "support-toggle";
        toggleBtn.textContent = `show ${supportOnly.length} support-only queen${supportOnly.length !== 1 ? "s" : ""}`;
        toggleBtn.addEventListener("click", () => {
          const open = supportWrap.style.display === "none";
          supportWrap.style.display = open ? "" : "none";
          toggleBtn.textContent = open
            ? `hide support-only queen${supportOnly.length !== 1 ? "s" : ""}`
            : `show ${supportOnly.length} support-only queen${supportOnly.length !== 1 ? "s" : ""}`;
        });
        container.appendChild(toggleBtn);
      }
    }
  }

  function updateSubtitle() {
    const total = DRAG_SHOWS ? DRAG_SHOWS.length : 0;
    if (total === 0) {
      document.getElementById("subtitle").textContent = "Add your shows to drag-shows-data.js";
      return;
    }
    const queens = new Set();
    for (const s of DRAG_SHOWS) {
      for (const q of [...(s.headliners||[]), ...(s.support||[]), ...(s.performers||[])]) {
        queens.add(q);
      }
    }
    document.getElementById("subtitle").textContent =
      `${total} show${total !== 1 ? "s" : ""} · ${queens.size} queen${queens.size !== 1 ? "s" : ""}`;
  }

  // ── Controls ──────────────────────────────────────────────────────────────

  document.querySelectorAll(".page-header .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll(".page-header .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      secondarySort = "alpha";
      document.querySelectorAll("#secondary-sort-wrap .view-btn").forEach(b => b.classList.toggle("active", b.dataset.sort === "alpha"));
      document.getElementById("secondary-sort-wrap").style.display = currentView === "queens" ? "" : "none";
      render();
    });
  });

  document.querySelectorAll("#secondary-sort-wrap .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      secondarySort = btn.dataset.sort;
      document.querySelectorAll("#secondary-sort-wrap .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  updateSubtitle();
  render();
</script>
<script>
  // Survivor flyout
  (function() {
    var g = document.getElementById('survivor-group');
    var t = document.getElementById('survivor-trigger');
    var f = document.getElementById('survivor-flyout');
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); document.getElementById('drag-flyout').classList.remove('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();

  // Drag flyout (open by default since current page is in it)
  (function() {
    var g = document.getElementById('drag-group');
    var t = document.getElementById('drag-trigger');
    var f = document.getElementById('drag-flyout');
    f.classList.add('open');
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); document.getElementById('survivor-flyout').classList.remove('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();
</script>
</body>
</html>
