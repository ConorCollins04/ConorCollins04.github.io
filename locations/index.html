<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100%;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0 0 60px; /* leave room for nav pill */
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      padding: 40px 5vw 24px;
      flex-shrink: 0;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 0;
      border-top: 1px solid var(--border);
    }

    /* ── Leaflet overrides ── */
    .leaflet-popup-content-wrapper {
      font-family: var(--sans);
      font-size: 0.82rem;
      color: var(--text);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(26,22,36,0.12);
      border: 1px solid var(--border);
    }
    .leaflet-popup-content { margin: 12px 16px; }
    .leaflet-popup-tip { display: none; }

    .popup-city {
      font-family: var(--slab);
      font-size: 1rem;
      line-height: 1.2;
      color: var(--text);
    }
    .popup-country {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-top: 3px;
    }
    .popup-visits {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .popup-visit-date {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.03em;
      color: var(--text);
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Locations</h1>
    <div class="page-subtitle" id="stats">—</div>
  </div>
  <div id="map"></div>
</div>

<div class="nav-wrap"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script>
  // Stats
  function formatDate(str) {
    if (!str) return "unknown";
    const [y, m, d] = str.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    if (!m) return y;
    return `${d ? parseInt(d) + " " : ""}${months[parseInt(m) - 1]} ${y}`;
  }

  // Stats (null visits count as visits, just undated)
  if (typeof LOCATIONS !== "undefined" && LOCATIONS.length > 0) {
    const countries = new Set(LOCATIONS.map(l => l.country)).size;
    const totalVisits = LOCATIONS.reduce((sum, l) => sum + (l.visits ? l.visits.length : 0), 0);
    document.getElementById("stats").textContent =
      `${LOCATIONS.length} ${LOCATIONS.length === 1 ? "city" : "cities"} · ${countries} ${countries === 1 ? "country" : "countries"} · ${totalVisits} ${totalVisits === 1 ? "visit" : "visits"}`;
  }

  // Map
  const map = L.map("map", { zoomControl: true });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  }).addTo(map);

  if (typeof LOCATIONS !== "undefined" && LOCATIONS.length > 0) {
    const markers = LOCATIONS.map(loc => {
      const visits = loc.visits || [];
      const count = visits.length;
      const radius = count <= 1 ? 7 : count <= 3 ? 9 : 11;

      const isCountry = loc.city === loc.country;
      const marker = L.circleMarker([loc.lat, loc.lng], {
        radius,
        fillColor: isCountry ? "#6b6278" : "#1a1624",
        color: "#f3f1f8",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.85,
      });

      // Sort: dated visits newest first, nulls at the end
      const sortedVisits = [...visits].sort((a, b) => {
        const ad = a.date, bd = b.date;
        if (!ad && !bd) return 0;
        if (!ad) return 1;
        if (!bd) return -1;
        return bd.localeCompare(ad);
      });
      const visitRows = sortedVisits.map(v =>
        `<div class="popup-visit-date">${formatDate(v.date)}</div>`
      ).join("");

      marker.bindPopup(
        `<div class="popup-city">${loc.city}</div>` +
        `<div class="popup-country">${loc.country}</div>` +
        (visitRows ? `<div class="popup-visits">${visitRows}</div>` : ""),
        { maxWidth: 220 }
      );

      return marker.addTo(map);
    });

    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.25));
  } else {
    map.setView([20, 0], 2);
  }
</script>
<script src="../nav.js"></script>
</body>
</html>
