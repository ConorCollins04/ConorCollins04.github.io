<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor All-Stars Casting — Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f1f8;
      --surface: #faf9fd;
      --surface2: #f0eef6;
      --border: rgba(80,60,120,0.1);
      --border-hover: rgba(80,60,120,0.28);
      --text: #1a1624;
      --muted: #6b6278;
      --faint: #b0a8be;
      --nav-bg: #1a1624;
      --nav-muted: rgba(243,241,248,0.38);
      --nav-active-bg: #f3f1f8;
      --nav-active-text: #1a1624;
      --slab: 'Alfa Slab One', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 284px;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ── Left pool ── */
    .pool {
      padding: 56px 40px 40px 10vw;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .pool-header { margin-bottom: 28px; }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .pool-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Season tabs */
    .season-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .season-tab {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .season-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .season-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .season-heading { margin-bottom: 20px; }

    .season-heading h2 {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .season-heading p {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--faint);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    /* Tribe sections */
    .tribe-section { margin-bottom: 26px; }

    .tribe-label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
    }

    .tribe-swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tribe-name {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Player grid */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 6px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 8px 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      text-align: center;
      user-select: none;
    }

    .player-card:hover:not(.selected):not(.disabled) {
      border-color: var(--border-hover);
      background: var(--surface2);
      box-shadow: 0 2px 8px rgba(80,60,120,0.07);
    }

    .player-card.selected {
      background: var(--text);
      border-color: var(--text);
    }

    .player-card.disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img, .cast-slot-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .player-card.selected .avatar {
      background: rgba(255,255,255,0.1) !important;
      color: rgba(243,241,248,0.9) !important;
    }

    .player-name {
      font-size: 0.68rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }
    .player-name-last { font-weight: 300; color: var(--muted); }
    .player-card.selected .player-name { color: var(--bg); }
    .player-card.selected .player-name-last { color: rgba(243,241,248,0.6); }

    .check-mark {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: rgba(243,241,248,0.5);
      opacity: 0;
      height: 11px;
      letter-spacing: 0.04em;
    }
    .player-card.selected .check-mark { opacity: 1; }

    /* ── Right cast panel ── */
    .cast-panel {
      padding: 56px 20px 40px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .cast-panel-header { margin-bottom: 18px; }

    .cast-panel-header h2 {
      font-family: var(--slab);
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
    }

    .cast-counts { display: flex; gap: 14px; }

    .cast-count {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .cast-count span { color: var(--text); }
    .cast-count.full span { color: #5a7a3a; }

    .cast-section { margin-bottom: 14px; }

    .cast-section-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
      margin-bottom: 6px;
    }

    .cast-slots { display: flex; flex-direction: column; gap: 3px; }

    .cast-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      min-height: 36px;
    }

    .cast-slot.empty {
      background: none;
      border-style: dashed;
    }

    .cast-slot-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.5rem;
      flex-shrink: 0;
    }

    .cast-slot-info { flex: 1; min-width: 0; }

    .cast-slot-name {
      font-size: 0.7rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .cast-slot-sub {
      font-family: var(--mono);
      font-size: 0.56rem;
      color: var(--faint);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cast-slot-empty-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--faint);
      letter-spacing: 0.05em;
    }

    .remove-btn {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 3px;
      line-height: 1;
      transition: color 0.1s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--text); }

    .cast-footer {
      margin-top: auto;
      padding-top: 16px;
      display: flex;
      gap: 16px;
    }
    .reset-btn {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: color 0.1s;
    }
    .reset-btn:hover { color: var(--text); }

    /* ── Floating nav ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--nav-bg);
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--nav-muted);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      font-weight: 500;
    }
  /* ── Continue button ── */
  .continue-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .continue-btn:disabled { opacity: 0.22; cursor: not-allowed; }
  .continue-btn:not(:disabled):hover { opacity: 0.82; }

  /* ── Tribes phase ── */
  #tribes-phase { background: var(--bg); min-height: 100vh; }
  .tribes-layout { padding: 56px 8vw 100px; }

  .tribes-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 32px;
  }
  .tribes-header-left { flex: 1; }
  .tribes-header-left h1 { margin-bottom: 8px; }
  .tribes-header-actions { display: flex; gap: 8px; padding-top: 8px; flex-shrink: 0; }

  .action-btn {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .action-btn:hover { border-color: var(--border-hover); color: var(--text); }

  .tribe-pool-section { margin-bottom: 28px; }
  .tribe-pool-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .tribe-pool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 6px;
    min-height: 64px;
    padding: 8px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .tribe-pool-grid.drag-over { border-color: var(--border-hover); background: var(--surface2); }
  .tribe-pool-empty {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--faint);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    letter-spacing: 0.04em;
  }

  .tribe-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

  .tribe-col {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .tribe-col.drag-over { border-color: var(--border-hover); }

  .tribe-col-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 9px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tribe-col-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .tribe-col-name { font-family: var(--slab); font-size: 0.88rem; font-weight: 400; color: var(--text); flex: 1; }
  .tribe-col-count { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.04em; }
  .tribe-col-count.full { color: #5a7a3a; }

  .tribe-col-body { padding: 8px; display: flex; flex-direction: column; gap: 3px; }

  /* Draggable state */
  .draggable { cursor: grab; }
  .draggable:active { cursor: grabbing; }
  .draggable.dragging { opacity: 0.28; }
  </style>
</head>

<div class="layout" id="casting-layout">
  <div class="pool">
    <div class="pool-header">
      <h1>All-Stars Casting</h1>
      <p class="pool-subtitle">Draft your ideal 18-person all-star cast for season 8, with 9 men and 9 women.</p>
    </div>
    <div class="season-tabs" id="season-tabs"></div>
    <div class="season-heading" id="season-heading"></div>
    <div id="player-pool"></div>
  </div>

  <div class="cast-panel">
    <div class="cast-panel-header">
      <h2>Your cast</h2>
      <div class="cast-counts">
        <div class="cast-count" id="count-w">Women: <span>0</span>/9</div>
        <div class="cast-count" id="count-m">Men: <span>0</span>/9</div>
      </div>
    </div>
    <div class="cast-section">
      <div class="cast-section-label">Women</div>
      <div class="cast-slots" id="slots-w"></div>
    </div>
    <div class="cast-section">
      <div class="cast-section-label">Men</div>
      <div class="cast-slots" id="slots-m"></div>
    </div>
    <div class="cast-footer">
      <button class="reset-btn" id="reset-btn">↺ clear all</button>
      <button class="reset-btn" id="randomize-cast-btn">⚂ randomise</button>
    </div>
    <button class="continue-btn" id="continue-btn" disabled>Draft Tribes →</button>
  </div>
</div>

<div id="tribes-phase" style="display:none">
  <div class="tribes-layout">
    <div class="tribes-header">
      <div class="tribes-header-left">
        <h1>Tribe Draft</h1>
        <p class="pool-subtitle" id="tribes-subtitle">Drag castaways into their tribes (or randomise)</p>
      </div>
      <div class="tribes-header-actions">
        <button class="action-btn" id="randomize-btn">⚂ randomise</button>
        <button class="action-btn" id="back-cast-btn">← back to cast</button>
      </div>
    </div>
    <div class="tribe-pool-section">
      <div class="tribe-pool-label">Unassigned <span id="unassigned-count">18</span></div>
      <div class="tribe-pool-grid" id="tribe-pool-grid"></div>
    </div>
    <div class="tribe-columns" id="tribe-columns"></div>
  </div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="survivor-all-stars.html" class="nav-btn active">Survivor All-Stars Casting</a>
  </nav>
</div>

const PLAYER_INFO = {};
SEASONS.forEach(s => s.tribes.forEach(t => t.players.forEach(p => {
  PLAYER_INFO[p.name] = { season: s, tribe: t, gender: p.gender };
})));

let currentSeason = 1;
const castW = [], castM = [];
const MAX = 9;

function initials(name) {
  return name.split(" ").filter(w => w.length > 1).map(w => w[0]).slice(0, 2).join("").toUpperCase();
}

function imgSlug(name) {
  return name.toLowerCase()
    .replace(/['']/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");
}

function tryImage(img, name, seasonId) {
  const slug = imgSlug(name);
  const base = `images/survivor/s${seasonId}/${slug}`;
  img.src = `${base}.webp`;
  img.onerror = () => {
    img.onerror = () => { img.style.display = "none"; };
    img.src = `${base}.jpg`;
  };
  img.onload = () => {
    if (img.nextElementSibling) img.nextElementSibling.style.display = "none";
  };
}

function avatarHtml(name, seasonId, bgColor, fgColor) {
  const id = initials(name);
  return `<div class="avatar" style="background:${bgColor};color:${fgColor}" data-name="${name}" data-season="${seasonId}">
    <img alt="${name}">
    <span>${id}</span>
  </div>`;
}

function slotAvatarHtml(name, seasonId, bgColor, fgColor) {
  const id = initials(name);
  return `<div class="cast-slot-avatar" style="background:${bgColor};color:${fgColor}" data-name="${name}" data-season="${seasonId}">
    <img alt="${name}">
    <span>${id}</span>
  </div>`;
}
function isSelected(name) { return castW.includes(name) || castM.includes(name); }
function genderFull(g) { return g === "f" ? castW.length >= MAX : castM.length >= MAX; }

function renderTabs() {
  const el = document.getElementById("season-tabs");
  el.innerHTML = SEASONS.map(s =>
    `<button class="season-tab ${s.id === currentSeason ? "active" : ""}" data-season="${s.id}">S${s.id}</button>`
  ).join("");
  el.querySelectorAll(".season-tab").forEach(btn => {
    btn.addEventListener("click", () => { currentSeason = +btn.dataset.season; renderTabs(); renderPool(); });
  });
}

function renderPool() {
  const season = SEASONS.find(s => s.id === currentSeason);
  document.getElementById("season-heading").innerHTML = `
    <h2>${season.name}</h2>
    <p>${season.year} · ${season.tribes.reduce((n, t) => n + t.players.length, 0)} players</p>
  `;
  document.getElementById("player-pool").innerHTML = season.tribes.map(tribe => `
    <div class="tribe-section">
      <div class="tribe-label">
        <div class="tribe-swatch" style="background:${tribe.color}"></div>
        <span class="tribe-name">${tribe.name}</span>
      </div>
      <div class="player-grid">
        ${tribe.players.map(p => {
          const sel  = isSelected(p.name);
          const full = !sel && genderFull(p.gender);
          const parts = p.name.split(" ");
          return `
            <div class="player-card ${sel ? "selected" : ""} ${full ? "disabled" : ""}"
                 data-name="${p.name}" data-gender="${p.gender}">
              ${avatarHtml(p.name, season.id, sel ? "rgba(255,255,255,0.1)" : `${tribe.color}20`, sel ? "rgba(243,241,248,0.9)" : tribe.color)}
              <div class="player-name">
                ${parts[0]}<br><span class="player-name-last">${parts.slice(1).join(" ")}</span>
              </div>
              <div class="check-mark">✓ picked</div>
            </div>`;
        }).join("")}
      </div>
    </div>
  `).join("");
  document.querySelectorAll(".player-card:not(.disabled)").forEach(card => {
    card.addEventListener("click", () => togglePlayer(card.dataset.name, card.dataset.gender));
  });
  document.querySelectorAll(".avatar[data-name]").forEach(el => {
    tryImage(el.querySelector("img"), el.dataset.name, el.dataset.season);
  });
}

function togglePlayer(name, gender) {
  const arr = gender === "f" ? castW : castM;
  const idx = arr.indexOf(name);
  if (idx > -1) arr.splice(idx, 1);
  else { if (arr.length >= MAX) return; arr.push(name); }
  renderPool(); renderPanel();
}

function renderPanel() {
  const wEl = document.getElementById("count-w");
  const mEl = document.getElementById("count-m");
  wEl.innerHTML = `Women: <span>${castW.length}</span>/9`;
  mEl.innerHTML = `Men: <span>${castM.length}</span>/9`;
  wEl.className = "cast-count" + (castW.length === MAX ? " full" : "");
  mEl.className = "cast-count" + (castM.length === MAX ? " full" : "");

  function slotsHtml(arr, gender) {
    return Array.from({ length: MAX }, (_, i) => {
      const name = arr[i];
      if (!name) return `<div class="cast-slot empty"><span class="cast-slot-empty-label">slot ${i + 1}</span></div>`;
      const { season, tribe } = PLAYER_INFO[name] || {};
      return `
        <div class="cast-slot">
          ${slotAvatarHtml(name, season?.id, `${tribe?.color ?? "#888"}20`, tribe?.color ?? "#888")}
          <div class="cast-slot-info">
            <div class="cast-slot-name">${name}</div>
            <div class="cast-slot-sub">S${season?.id} · ${season?.name ?? "?"}</div>
          </div>
          <button class="remove-btn" data-name="${name}" data-gender="${gender}">✕</button>
        </div>`;
    }).join("");
  }

  document.getElementById("slots-w").innerHTML = slotsHtml(castW, "f");
  document.getElementById("slots-m").innerHTML = slotsHtml(castM, "m");
  document.querySelectorAll(".cast-slot-avatar[data-name]").forEach(el => {
    tryImage(el.querySelector("img"), el.dataset.name, el.dataset.season);
  });
  document.querySelectorAll(".remove-btn").forEach(btn => {
    btn.addEventListener("click", () => togglePlayer(btn.dataset.name, btn.dataset.gender));
  });
  const castFull = castW.length === MAX && castM.length === MAX;
  document.getElementById("continue-btn").disabled = !castFull;
}

document.getElementById("reset-btn").addEventListener("click", () => {
  castW.length = 0; castM.length = 0; renderPool(); renderPanel();
});

document.getElementById("randomize-cast-btn").addEventListener("click", () => {
  const shuffle = arr => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  };
  const allWomen = [], allMen = [];
  SEASONS.forEach(s => s.tribes.forEach(t => t.players.forEach(p => {
    (p.gender === "f" ? allWomen : allMen).push(p.name);
  })));
  castW.length = 0; castM.length = 0;
  shuffle(allWomen).slice(0, MAX).forEach(n => castW.push(n));
  shuffle(allMen).slice(0, MAX).forEach(n => castM.push(n));
  renderPool(); renderPanel();
});

// ─── Tribe draft ────────────────────────────────────────────────────────────
const ALLSTAR_TRIBES = [
  { id: "chapera",  name: "Chapera",   color: "#BC080A" },
  { id: "mogoMogo", name: "Mogo Mogo", color: "#3A663D" },
  { id: "saboga",   name: "Saboga",    color: "#FFFF00" },
];
const TRIBE_SIZE = 6;
const tribeAssignments = { chapera: [], mogoMogo: [], saboga: [] };
let draggedPlayer = null;
let tribeDropInitialized = false;

function getUnassigned() {
  const assigned = new Set(Object.values(tribeAssignments).flat());
  return [...castW, ...castM].filter(n => !assigned.has(n));
}

function movePlayer(name, destId) {
  if (destId) {
    const members = tribeAssignments[destId];
    if (members.length >= TRIBE_SIZE) return;
    const gender = PLAYER_INFO[name]?.gender;
    const genderCount = members.filter(n => PLAYER_INFO[n]?.gender === gender).length;
    if (genderCount >= 3) return;
  }
  ALLSTAR_TRIBES.forEach(t => {
    const i = tribeAssignments[t.id].indexOf(name);
    if (i > -1) tribeAssignments[t.id].splice(i, 1);
  });
  if (destId) tribeAssignments[destId].push(name);
}

function setupDropZone(el, destId) {
  el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over"); });
  el.addEventListener("dragleave", e => { if (!el.contains(e.relatedTarget)) el.classList.remove("drag-over"); });
  el.addEventListener("drop", e => {
    e.preventDefault();
    el.classList.remove("drag-over");
    if (!draggedPlayer) return;
    movePlayer(draggedPlayer, destId);
    draggedPlayer = null;
    renderTribeDraft();
  });
}

function makeDraggable(el, name) {
  el.draggable = true;
  el.classList.add("draggable");
  el.addEventListener("dragstart", e => {
    draggedPlayer = name;
    e.dataTransfer.effectAllowed = "move";
    requestAnimationFrame(() => el.classList.add("dragging"));
  });
  el.addEventListener("dragend", () => {
    el.classList.remove("dragging");
    draggedPlayer = null;
  });
}

function renderTribeDraft() {
  const unassigned = getUnassigned();
  document.getElementById("unassigned-count").textContent = unassigned.length;
  document.getElementById("tribes-subtitle").textContent = unassigned.length === 0
    ? "All 18 castaways assigned to tribes"
    : "Drag castaways into their tribes (or randomise)";

  // Pool
  const poolGrid = document.getElementById("tribe-pool-grid");
  poolGrid.innerHTML = unassigned.length === 0
    ? '<span class="tribe-pool-empty">All players assigned ✓</span>'
    : "";
  unassigned.forEach(name => {
    const { season, tribe } = PLAYER_INFO[name] || {};
    const card = document.createElement("div");
    card.className = "player-card";
    const parts = name.split(" ");
    card.innerHTML = `
      ${avatarHtml(name, season?.id, `${tribe?.color ?? "#888"}20`, tribe?.color ?? "#888")}
      <div class="player-name">${parts[0]}<br><span class="player-name-last">${parts.slice(1).join(" ")}</span></div>`;
    card.querySelectorAll(".avatar[data-name]").forEach(a => tryImage(a.querySelector("img"), a.dataset.name, a.dataset.season));
    makeDraggable(card, name);
    poolGrid.appendChild(card);
  });

  // Tribe columns
  const colsEl = document.getElementById("tribe-columns");
  colsEl.innerHTML = "";
  ALLSTAR_TRIBES.forEach(t => {
    const members = tribeAssignments[t.id];
    const wCount = members.filter(n => PLAYER_INFO[n]?.gender === "f").length;
    const mCount = members.filter(n => PLAYER_INFO[n]?.gender === "m").length;
    const isFull = wCount === 3 && mCount === 3;
    const col = document.createElement("div");
    col.className = "tribe-col";
    col.innerHTML = `
      <div class="tribe-col-header">
        <div class="tribe-col-swatch" style="background:${t.color}"></div>
        <span class="tribe-col-name">${t.name}</span>
        <span class="tribe-col-count${isFull ? " full" : ""}">${wCount}/3 ♀ · ${mCount}/3 ♂</span>
      </div>
      <div class="tribe-col-body"></div>`;
    const body = col.querySelector(".tribe-col-body");
    for (let i = 0; i < TRIBE_SIZE; i++) {
      const name = members[i];
      if (name) {
        const { season, tribe } = PLAYER_INFO[name] || {};
        const row = document.createElement("div");
        row.className = "cast-slot";
        row.innerHTML = `
          ${slotAvatarHtml(name, season?.id, `${tribe?.color ?? "#888"}20`, tribe?.color ?? "#888")}
          <div class="cast-slot-info">
            <div class="cast-slot-name">${name}</div>
            <div class="cast-slot-sub">S${season?.id} · ${tribe?.name ?? "?"}</div>
          </div>`;
        row.querySelectorAll(".cast-slot-avatar[data-name]").forEach(a => tryImage(a.querySelector("img"), a.dataset.name, a.dataset.season));
        makeDraggable(row, name);
        body.appendChild(row);
      } else {
        const slot = document.createElement("div");
        slot.className = "cast-slot empty";
        slot.innerHTML = `<span class="cast-slot-empty-label">slot ${i + 1}</span>`;
        body.appendChild(slot);
      }
    }
    setupDropZone(col, t.id);
    colsEl.appendChild(col);
  });
}

function enterTribePhase() {
  const castSet = new Set([...castW, ...castM]);
  ALLSTAR_TRIBES.forEach(t => { tribeAssignments[t.id] = tribeAssignments[t.id].filter(n => castSet.has(n)); });
  document.getElementById("casting-layout").style.display = "none";
  document.getElementById("tribes-phase").style.display = "";
  if (!tribeDropInitialized) {
    setupDropZone(document.getElementById("tribe-pool-grid"), null);
    tribeDropInitialized = true;
  }
  renderTribeDraft();
}

function exitTribePhase() {
  document.getElementById("tribes-phase").style.display = "none";
  document.getElementById("casting-layout").style.display = "";
}

function randomizeTribes() {
  ALLSTAR_TRIBES.forEach(t => { tribeAssignments[t.id] = []; });
  const shuffle = arr => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  };
  const women = shuffle([...castW]);
  const men = shuffle([...castM]);
  ALLSTAR_TRIBES.forEach((t, i) => {
    tribeAssignments[t.id] = [...women.slice(i * 3, i * 3 + 3), ...men.slice(i * 3, i * 3 + 3)];
  });
  renderTribeDraft();
}

document.getElementById("continue-btn").addEventListener("click", enterTribePhase);
document.getElementById("back-cast-btn").addEventListener("click", exitTribePhase);
document.getElementById("randomize-btn").addEventListener("click", randomizeTribes);

renderTabs(); renderPool(); renderPanel();
</script>
