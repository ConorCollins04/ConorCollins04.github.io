<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 5vw 120px;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .archive-link {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.12s;
    }
    .archive-link:hover { color: var(--text); }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-sep {
      width: 1px;
      height: 16px;
      background: var(--border-hover);
      flex-shrink: 0;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 15px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card--done {
      background: var(--surface2);
      box-shadow: inset 3px 0 0 var(--text);
    }

    .card--undone { opacity: 0.42; }

    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 20px rgba(26,22,36,0.06);
    }

    .card--done:hover {
      box-shadow: inset 3px 0 0 var(--text), 0 4px 20px rgba(26,22,36,0.06);
    }

    .card:hover .card-arrow { transform: translateX(3px); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .card-top-left {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .card-bottom {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .card-check {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .card-name {
      font-family: var(--slab);
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.2;
    }

    .card-exp {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-type {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      text-transform: uppercase;
    }

    .codename-badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 4px;
      display: inline-block;
      line-height: 1.5;
    }

    .card-arrow {
      font-size: 1rem;
      color: var(--faint);
      transition: transform 0.15s;
      line-height: 1;
    }

    .card--special {
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 18px 26px;
      border-color: transparent;
    }

    .card--special .card-name {
      font-size: 1rem;
      flex: unset;
    }

    .empty {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Puzzles</h1>
    <div class="header-right">
      <div class="page-subtitle" id="stats">—</div>
      <a class="archive-link" id="archive-link" href="" target="_blank" rel="noopener noreferrer" hidden>Archive →</a>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>
</div>

<div class="nav-wrap"></div>

<script src="data.js"></script>
<script>
  const filters = document.getElementById("filters");
  const grid = document.getElementById("grid");
  const statsEl = document.getElementById("stats");

  let activeFilter = "Rat Run";
  let activeCompletion = "all";

  const GROUP_ORDER = ["Rat Run", "Puzzled Pint", "Jane Street", "Other Hunt"];

  const ARCHIVES = {
    "Rat Run":      "https://logic-masters.de/Raetselportal/Raetsel/zeigen.php?id=000IFI",
    "Puzzled Pint": "https://puzzledpint.org/puzzle-archive/",
  };

  function cardHtml(p) {
    const linkAttrs = p.url
      ? `href="${p.url}" target="_blank" rel="noopener noreferrer"`
      : ``;

    const done = p.group === "Rat Run" ? p.completed !== false : p.completed === true;

    if (p.special) {
      const fg = p.darkText ? "#1a1624" : "#fff";
      const arrowFg = p.darkText ? "rgba(26,22,36,0.3)" : "rgba(255,255,255,0.45)";
      const checkFg = p.darkText ? "rgba(26,22,36,0.4)" : "rgba(255,255,255,0.6)";
      return `
        <a ${linkAttrs} class="card card--special${done ? "" : " card--undone"}" style="background:${p.color}">
          ${done ? `<span class="card-check" style="color:${checkFg}">✓</span>` : ""}
          <div class="card-name" style="color:${fg}">${p.name}</div>
          <div class="card-arrow" style="color:${arrowFg}">→</div>
        </a>`;
    }

    const badgeStyle = `background:${p.color};color:${p.darkText ? "#1a1624" : "#fff"}${p.bordered ? ";box-shadow:inset 0 0 0 1px rgba(26,22,36,0.18)" : ""}`;
    const topLeft = p.codename
      ? `<span class="card-exp">Exp. ${p.experiment}</span>
         <span class="codename-badge" style="${badgeStyle}">${p.codename}</span>`
      : p.isMeta
        ? `<span class="card-type">Annual Meta · ${p.year}</span>`
        : p.month
          ? `<span class="card-type">${p.month} ${p.year}</span>`
          : `<span class="card-type">${p.group}</span>`;

    return `
      <a ${linkAttrs} class="card${done ? " card--done" : " card--undone"}">
        <div class="card-top">
          <div class="card-top-left">${topLeft}</div>
          ${done ? `<span class="card-check">✓</span>` : ""}
        </div>
        <div class="card-bottom">
          <div class="card-name">${p.name}</div>
          <div class="card-arrow">→</div>
        </div>
      </a>`;
  }

  function isDone(p) {
    return p.group === "Rat Run" ? p.completed !== false : p.completed === true;
  }

  function render() {
    let visible = PUZZLES.filter(p => p.group === activeFilter);
    if (activeCompletion === "done")   visible = visible.filter(p =>  isDone(p));
    if (activeCompletion === "undone") visible = visible.filter(p => !isDone(p));

    const total = PUZZLES.filter(p => p.group === activeFilter).length;
    const done  = PUZZLES.filter(p => p.group === activeFilter && isDone(p)).length;
    statsEl.textContent = `${done} / ${total} done`;

    const archiveEl = document.getElementById("archive-link");
    if (ARCHIVES[activeFilter]) {
      archiveEl.href = ARCHIVES[activeFilter];
      archiveEl.hidden = false;
    } else {
      archiveEl.hidden = true;
    }

    grid.innerHTML = visible.length === 0
      ? '<p class="empty">No puzzles yet.</p>'
      : visible.map(cardHtml).join("");
  }

  function buildFilters() {
    const present = new Set(PUZZLES.map(p => p.group));
    const groups = GROUP_ORDER.filter(g => present.has(g));

    const groupBtns = groups.map(g =>
      `<button class="filter-btn${g === activeFilter ? " active" : ""}" data-group="${g}">${g}</button>`
    ).join("");

    const completionBtns = [
      { id: "all",    label: "All"    },
      { id: "done",   label: "Done"   },
      { id: "undone", label: "Undone" },
    ].map(b =>
      `<button class="filter-btn${b.id === activeCompletion ? " active" : ""}" data-completion="${b.id}">${b.label}</button>`
    ).join("");

    filters.innerHTML = groupBtns + `<div class="filter-sep"></div>` + completionBtns;

    filters.querySelectorAll("[data-group]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeFilter = btn.dataset.group;
        filters.querySelectorAll("[data-group]").forEach(b => b.classList.toggle("active", b === btn));
        render();
      });
    });

    filters.querySelectorAll("[data-completion]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeCompletion = btn.dataset.completion;
        filters.querySelectorAll("[data-completion]").forEach(b => b.classList.toggle("active", b === btn));
        render();
      });
    });
  }

  buildFilters();
  render();
</script>
<script src="../nav.js"></script>
</body>
</html>
