<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscars — Conor Collins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f1f8;
      --surface:       #faf9fd;
      --surface2:      #f0eef6;
      --border:        rgba(80,60,120,0.1);
      --border-hover:  rgba(80,60,120,0.28);
      --text:          #1a1624;
      --muted:         #6b6278;
      --faint:         #b0a8be;
      --gold:          #b8860b;
      --gold-bg:       #fdf8ed;
      --gold-border:   rgba(184,134,11,0.3);
      --slab:  'Alfa Slab One', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Page layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 10vw 100px;
    }

    /* ── Header ── */
    .page-header { margin-bottom: 28px; }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Year tabs ── */
    .year-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .year-tab {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .year-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .year-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Year heading ── */
    .year-heading { margin-bottom: 32px; }

    .year-heading h2 {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .year-heading p {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--faint);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    /* ── Category rows ── */
    .category-row {
      margin-bottom: 32px;
    }

    .category-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .nominee-track {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      /* hide scrollbar but keep scroll */
      scrollbar-width: none;
    }
    .nominee-track::-webkit-scrollbar { display: none; }

    /* divider between ranked and not-seen */
    .not-seen-divider {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin: 0 4px;
    }
    .not-seen-divider-line {
      width: 1px;
      height: 60px;
      background: var(--border);
    }

    /* ── Nominee cards ── */
    .nominee-card {
      flex-shrink: 0;
      width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .nominee-card.is-winner {
      background: var(--gold-bg);
      border-color: var(--gold-border);
    }

    .nominee-card.not-seen {
      opacity: 0.4;
    }

    /* rank badge */
    .nominee-rank {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      line-height: 1;
      margin-bottom: 2px;
    }
    .nominee-card.is-winner .nominee-rank { color: var(--gold); }

    /* winner star */
    .winner-star {
      position: absolute;
      top: 9px;
      right: 10px;
      font-size: 0.6rem;
      color: var(--gold);
      line-height: 1;
    }

    .nominee-title {
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }

    .nominee-film {
      font-size: 0.67rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.3;
      font-style: italic;
    }

    .not-seen-label {
      font-family: var(--mono);
      font-size: 0.52rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--faint);
      margin-top: 2px;
    }

    /* ── Floating nav ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #1a1624;
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(243,241,248,0.38);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Oscars</h1>
    <p class="page-subtitle">Nominees ranked by preference, left to right. Greyed out = not yet seen.</p>
  </div>

  <div class="year-tabs" id="year-tabs"></div>
  <div class="year-heading" id="year-heading"></div>
  <div id="categories"></div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="survivor-all-stars.html" class="nav-btn">Survivor All-Stars Casting</a>
    <a href="oscars.html" class="nav-btn active">Oscars</a>
  </nav>
</div>

<script src="oscars-data.js"></script>
<script>
  const years = Object.keys(OSCARS).map(Number).sort((a, b) => b - a);
  let currentYear = years[0];

  function renderTabs() {
    const el = document.getElementById("year-tabs");
    el.innerHTML = years.map(y =>
      `<button class="year-tab ${y === currentYear ? "active" : ""}" data-year="${y}">${y}</button>`
    ).join("");
    el.querySelectorAll(".year-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        currentYear = +btn.dataset.year;
        renderTabs();
        renderYear();
      });
    });
  }

  function renderYear() {
    const data = OSCARS[currentYear];

    // Heading
    const heading = document.getElementById("year-heading");
    heading.innerHTML = `
      <h2>${currentYear}</h2>
      <p>${data.ceremony}</p>
    `;

    // Categories
    const container = document.getElementById("categories");
    container.innerHTML = "";

    for (const cat of CATEGORIES) {
      const nominees = data[cat];
      if (!nominees) continue;

      // Separate ranked vs not-seen
      const ranked = nominees
        .filter(n => n.rank != null)
        .sort((a, b) => a.rank - b.rank);
      const unseen = nominees.filter(n => n.notSeen);

      const row = document.createElement("div");
      row.className = "category-row";

      const label = document.createElement("div");
      label.className = "category-label";
      label.textContent = cat;
      row.appendChild(label);

      const track = document.createElement("div");
      track.className = "nominee-track";

      // Ranked cards
      ranked.forEach(n => {
        track.appendChild(buildCard(n, false));
      });

      // Divider + not-seen cards
      if (unseen.length > 0) {
        const divider = document.createElement("div");
        divider.className = "not-seen-divider";
        divider.innerHTML = `<div class="not-seen-divider-line"></div>`;
        track.appendChild(divider);

        unseen.forEach(n => {
          track.appendChild(buildCard(n, true));
        });
      }

      row.appendChild(track);
      container.appendChild(row);
    }
  }

  function buildCard(nominee, isNotSeen) {
    const card = document.createElement("div");
    card.className = "nominee-card" +
      (nominee.winner ? " is-winner" : "") +
      (isNotSeen ? " not-seen" : "");

    // Winner star
    if (nominee.winner) {
      const star = document.createElement("div");
      star.className = "winner-star";
      star.textContent = "★";
      card.appendChild(star);
    }

    // Rank
    if (!isNotSeen && nominee.rank != null) {
      const rank = document.createElement("div");
      rank.className = "nominee-rank";
      rank.textContent = `#${nominee.rank}`;
      card.appendChild(rank);
    }

    // Title — acting category vs Best Picture
    const title = document.createElement("div");
    title.className = "nominee-title";
    title.textContent = nominee.name || nominee.film;
    card.appendChild(title);

    // Film (acting only)
    if (nominee.name) {
      const film = document.createElement("div");
      film.className = "nominee-film";
      film.textContent = nominee.film;
      card.appendChild(film);
    }

    // Not seen label
    if (isNotSeen) {
      const label = document.createElement("div");
      label.className = "not-seen-label";
      label.textContent = "not seen";
      card.appendChild(label);
    }

    return card;
  }

  renderTabs();
  renderYear();
</script>
</body>
</html>
