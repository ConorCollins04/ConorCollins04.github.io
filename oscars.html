<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscars — Conor Collins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f1f8;
      --surface:       #faf9fd;
      --surface2:      #f0eef6;
      --border:        rgba(80,60,120,0.1);
      --border-hover:  rgba(80,60,120,0.28);
      --text:          #1a1624;
      --muted:         #6b6278;
      --faint:         #b0a8be;
      --gold:          #b8860b;
      --gold-bg:       #fdf8ed;
      --gold-border:   rgba(184,134,11,0.3);
      --slab:  'Alfa Slab One', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Page layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 10vw 100px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .view-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .view-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .view-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Year tabs ── */
    .year-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .year-tab {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .year-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .year-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Year heading ── */
    .year-heading { margin-bottom: 32px; }

    .year-heading h2 {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .year-heading p {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--faint);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    /* ── Category rows ── */
    .category-row { margin-bottom: 32px; }

    .category-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .nominee-track {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .nominee-track::-webkit-scrollbar { display: none; }

    .nominee-track.picture-grid {
      display: grid;
      grid-template-columns: repeat(5, 140px);
      grid-template-rows: repeat(2, auto);
      overflow-x: visible;
    }

    /* ── Nominee cards ── */
    .nominee-card {
      flex-shrink: 0;
      width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .nominee-card.is-winner {
      background: var(--gold-bg);
      border-color: var(--gold-border);
    }

    .nominee-card.not-seen { opacity: 0.4; }

    .nominee-rank {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      line-height: 1;
      margin-bottom: 2px;
    }
    .nominee-card.is-winner .nominee-rank { color: var(--gold); }

    .winner-star {
      position: absolute;
      top: 9px;
      right: 10px;
      font-size: 0.6rem;
      color: var(--gold);
      line-height: 1;
    }

    .nominee-title {
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }

    .nominee-film {
      font-size: 0.67rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.3;
      font-style: italic;
    }

    .not-seen-label {
      font-family: var(--mono);
      font-size: 0.52rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--faint);
      margin-top: 2px;
    }

    /* ── Progress view ── */
    .progress-year {
      margin-bottom: 40px;
    }

    .progress-year-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .progress-year-title {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .progress-year-ceremony {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--faint);
      letter-spacing: 0.04em;
    }

    .progress-year-total {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .progress-year-total span { color: var(--text); }

    .progress-category-wrap { margin-bottom: 9px; }

    .progress-category-row {
      display: grid;
      grid-template-columns: 160px 1fr 36px 20px;
      align-items: center;
      gap: 12px;
    }

    .progress-cat-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }

    .progress-bar-track {
      height: 6px;
      border-radius: 100px;
      background: var(--border);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--text);
      transition: width 0.3s ease;
    }

    .progress-cat-count {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .progress-chevron {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--faint);
      font-size: 0.65rem;
      padding: 0;
      line-height: 1;
      transition: color 0.12s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .progress-chevron:hover { color: var(--muted); }
    .progress-chevron.open { transform: rotate(180deg); color: var(--muted); }

    .progress-film-list {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding: 8px 0 4px 172px; /* align with bar */
    }
    .progress-film-list.open { display: flex; }

    .progress-film-chip {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.03em;
      padding: 3px 9px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    .progress-film-chip.unseen {
      opacity: 0.4;
    }

    /* ── Floating nav ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #1a1624;
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(243,241,248,0.38);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Oscars</h1>
      <p class="page-subtitle">My personal rankings.</p>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="rankings">Rankings</button>
      <button class="view-btn" data-view="progress">Progress</button>
    </div>
  </div>

  <!-- Rankings view -->
  <div id="rankings-view">
    <div class="year-tabs" id="year-tabs"></div>
    <div class="year-heading" id="year-heading"></div>
    <div id="categories"></div>
  </div>

  <!-- Progress view -->
  <div id="progress-view" style="display:none"></div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="survivor-all-stars.html" class="nav-btn">Survivor All-Stars Casting</a>
    <a href="oscars.html" class="nav-btn active">Oscars</a>
    <a href="concerts.html" class="nav-btn">Concerts</a>
    <a href="drag-race.html" class="nav-btn">Drag Race</a>
  </nav>
</div>

<script src="oscars-data.js"></script>
<script>
  const years = Object.keys(OSCARS).map(Number).sort((a, b) => b - a);
  let currentYear = years[0];
  let currentView = "rankings";

  // ── View toggle ──────────────────────────────────────────────────────────
  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll(".view-btn").forEach(b => b.classList.toggle("active", b === btn));
      document.getElementById("rankings-view").style.display = currentView === "rankings" ? "" : "none";
      document.getElementById("progress-view").style.display  = currentView === "progress"  ? "" : "none";
      if (currentView === "progress") renderProgress();
    });
  });

  // ── Rankings view ────────────────────────────────────────────────────────
  function renderTabs() {
    const el = document.getElementById("year-tabs");
    el.innerHTML = years.map(y =>
      `<button class="year-tab ${y === currentYear ? "active" : ""}" data-year="${y}">${y}</button>`
    ).join("");
    el.querySelectorAll(".year-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        currentYear = +btn.dataset.year;
        renderTabs();
        renderYear();
      });
    });
  }

  function renderYear() {
    const data = OSCARS[currentYear];

    const heading = document.getElementById("year-heading");
    heading.innerHTML = `
      <h2>${currentYear}</h2>
      <p>${data.ceremony}</p>
    `;

    const container = document.getElementById("categories");
    container.innerHTML = "";

    for (const cat of CATEGORIES) {
      const nominees = data[cat];
      if (!nominees) continue;

      const ranked = nominees.filter(n => n.rank != null).sort((a, b) => a.rank - b.rank);
      const unseen = nominees.filter(n => n.notSeen);

      const row = document.createElement("div");
      row.className = "category-row";

      const label = document.createElement("div");
      label.className = "category-label";
      label.textContent = cat;
      row.appendChild(label);

      const track = document.createElement("div");
      track.className = "nominee-track" + (cat === "Best Picture" ? " picture-grid" : "");

      ranked.forEach(n => track.appendChild(buildCard(n, false)));
      unseen.forEach(n => track.appendChild(buildCard(n, true)));

      row.appendChild(track);
      container.appendChild(row);
    }
  }

  function buildCard(nominee, isNotSeen) {
    const card = document.createElement("div");
    card.className = "nominee-card" +
      (nominee.winner ? " is-winner" : "") +
      (isNotSeen ? " not-seen" : "");

    if (nominee.winner) {
      const star = document.createElement("div");
      star.className = "winner-star";
      star.textContent = "★";
      card.appendChild(star);
    }

    if (!isNotSeen && nominee.rank != null) {
      const rank = document.createElement("div");
      rank.className = "nominee-rank";
      rank.textContent = `#${nominee.rank}`;
      card.appendChild(rank);
    }

    const title = document.createElement("div");
    title.className = "nominee-title";
    title.textContent = nominee.name || nominee.film;
    card.appendChild(title);

    if (nominee.name) {
      const film = document.createElement("div");
      film.className = "nominee-film";
      film.textContent = nominee.film;
      card.appendChild(film);
    }

    if (isNotSeen) {
      const label = document.createElement("div");
      label.className = "not-seen-label";
      label.textContent = "not seen";
      card.appendChild(label);
    }

    return card;
  }

  // ── Progress view ────────────────────────────────────────────────────────
  function renderProgress() {
    const container = document.getElementById("progress-view");
    container.innerHTML = "";

    for (const year of years) {
      const data = OSCARS[year];

      // Count unique films (a film nominated in multiple categories is one film)
      const filmSeen = new Map();
      for (const cat of CATEGORIES) {
        const nominees = data[cat];
        if (!nominees) continue;
        for (const n of nominees) {
          if (!filmSeen.has(n.film)) filmSeen.set(n.film, !n.notSeen);
          else if (!n.notSeen) filmSeen.set(n.film, true);
        }
      }
      const totalAll  = filmSeen.size;
      const totalSeen = [...filmSeen.values()].filter(Boolean).length;

      const yearBlock = document.createElement("div");
      yearBlock.className = "progress-year";

      // Year header
      const header = document.createElement("div");
      header.className = "progress-year-header";
      header.innerHTML = `
        <div>
          <span class="progress-year-title">${year}</span>
          <span class="progress-year-ceremony"> · ${data.ceremony}</span>
        </div>
        <div class="progress-year-total"><span>${totalSeen}</span>/${totalAll} seen</div>
      `;
      yearBlock.appendChild(header);

      // Category bars
      for (const cat of CATEGORIES) {
        const nominees = data[cat];
        if (!nominees) continue;
        const seen  = nominees.filter(n => !n.notSeen).length;
        const total = nominees.length;
        const pct   = total > 0 ? (seen / total) * 100 : 0;

        const wrap = document.createElement("div");
        wrap.className = "progress-category-wrap";

        const row = document.createElement("div");
        row.className = "progress-category-row";
        row.innerHTML = `
          <div class="progress-cat-label">${cat}</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-cat-count">${seen}/${total}</div>
        `;

        const chevron = document.createElement("button");
        chevron.className = "progress-chevron";
        chevron.innerHTML = "▾";
        row.appendChild(chevron);

        // Film list (hidden by default)
        const filmList = document.createElement("div");
        filmList.className = "progress-film-list";

        // Seen films first, then unseen
        const seenNominees   = nominees.filter(n => !n.notSeen);
        const unseenNominees = nominees.filter(n =>  n.notSeen);
        [...seenNominees, ...unseenNominees].forEach(n => {
          const chip = document.createElement("div");
          chip.className = "progress-film-chip" + (n.notSeen ? " unseen" : "");
          chip.textContent = n.name ? `${n.name} · ${n.film}` : n.film;
          filmList.appendChild(chip);
        });

        chevron.addEventListener("click", () => {
          const open = filmList.classList.toggle("open");
          chevron.classList.toggle("open", open);
        });

        wrap.appendChild(row);
        wrap.appendChild(filmList);
        yearBlock.appendChild(wrap);
      }

      container.appendChild(yearBlock);
    }
  }

  renderTabs();
  renderYear();
</script>
</body>
</html>
