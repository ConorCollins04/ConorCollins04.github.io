<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* result colours */
      --c-win:        #3b5fc0;
      --c-high:       #6ea4c5;
      --c-safe:       #cde0e0;
      --c-low:        #f4b8c1;
      --c-btm2:       #e07060;
      --c-elim:       #cc3333;
      --c-winner:     #c9a840;
      --c-runnerup:   #8a8a8a;
      --c-elim-final: #7a4a30;
      --c-miss-c:     #00c8d0;
      --c-top2:       #5a8fd4;
      --c-run:        #d6d2e0;
      --c-btm:        #d97060;
      --c-tba:        #d6d2e0;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 56px 4vw 120px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 40px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 6px;
    }

    /* ── Season tabs ── */
    .season-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .season-tab {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .season-tab:hover { border-color: rgba(80,60,120,0.25); color: var(--text); }

    .season-tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── Track record table ── */
    .track-record-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .track-record {
      border-collapse: collapse;
      width: 100%;
    }

    .track-record th,
    .track-record td {
      border: 1px solid rgba(80,60,120,0.07);
    }

    /* header */
    .track-record thead tr:first-child th {
      font-family: var(--mono);
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      background: var(--surface2);
      padding: 12px 8px 2px;
      text-align: center;
      vertical-align: bottom;
      white-space: nowrap;
    }

    .track-record thead tr:last-child th {
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 8px 10px;
      text-align: center;
      white-space: nowrap;
    }

    /* sticky identity columns */
    .col-queen { position: sticky; left: 0; min-width: 170px; background: var(--surface); z-index: 2; }
    .col-place { position: sticky; left: 170px; min-width: 68px; background: var(--surface); z-index: 2; }
    .col-score { position: sticky; left: 238px; min-width: 60px; background: var(--surface); z-index: 2; }

    thead .col-queen,
    thead .col-place,
    thead .col-score { background: var(--surface2); z-index: 3; }

    /* queen cell */
    .queen-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 10px 5px 12px;
    }

    .queen-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
      background: var(--surface2);
    }

    .queen-initials {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.52rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .queen-name {
      font-size: 0.77rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .place-cell,
    .score-cell {
      font-family: var(--mono);
      font-size: 0.7rem;
      text-align: center;
      padding: 5px 8px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* episode cells */
    .ep-cell {
      text-align: center;
      vertical-align: middle;
      min-width: 62px;
      padding: 5px 3px;
    }

    .result-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 7px;
      border-radius: 6px;
      white-space: nowrap;
      color: #fff;
    }

    .r-win        { background: var(--c-win); }
    .r-top2       { background: var(--c-top2); }
    .r-high       { background: var(--c-high); }
    .r-high-team  { background: var(--c-high); }
    .r-safe       { background: var(--c-safe); color: #5a7a7a; }
    .r-bye        { background: var(--c-run);  color: #7a7090; }
    .r-low        { background: var(--c-low);  color: #8a3040; }
    .r-btm        { background: var(--c-btm); }
    .r-btm2       { background: var(--c-btm2); }
    .r-elim       { background: var(--c-elim); }
    .r-winner     { background: var(--c-winner); }
    .r-runnerup   { background: var(--c-runnerup); }
    .r-elim-final { background: var(--c-elim-final); }
    .r-miss-c     { background: var(--c-miss-c); }
    .r-tba        { background: var(--c-tba);  color: #7a7090; }

    /* even-row tint on sticky cols */
    tbody tr:nth-child(even) .col-queen,
    tbody tr:nth-child(even) .col-place,
    tbody tr:nth-child(even) .col-score { background: #f6f4fc; }

    tbody tr:hover td { background: rgba(80,60,120,0.03); }

    /* legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 22px;
      margin-top: 18px;
      padding: 0 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .view-btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── Diff cell colouring ── */
    .diff-pos { color: #2a7a4a; }
    .diff-neg { color: #c03030; }

    /* ── Sortable headers ── */
    .sort-th {
      cursor: pointer;
      user-select: none;
    }

    .sort-th:hover { color: var(--text); }

    /* ── Scoring info ── */
    .scoring-info {
      margin-top: 20px;
      padding: 0 2px;
    }

    .scoring-info summary {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--faint);
      cursor: pointer;
      user-select: none;
      list-style: none;
    }

    .scoring-info summary::-webkit-details-marker { display: none; }

    .scoring-info summary::before {
      content: '▸ ';
    }

    .scoring-info[open] summary::before {
      content: '▾ ';
    }

    .scoring-grid {
      display: grid;
      grid-template-columns: max-content max-content;
      gap: 4px 20px;
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    .scoring-grid span:nth-child(even) {
      color: var(--faint);
    }

    .scoring-note {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.02em;
      color: var(--faint);
      margin-top: 10px;
      max-width: 420px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Drag Race</h1>
      <p class="page-subtitle">My personal judging</p>
    </div>
  </div>

  <div class="season-tabs" id="seasonTabs"></div>

  <div class="view-toggle" id="viewToggle" style="display:none">
    <button class="view-btn active" data-view="my">My judging</button>
    <button class="view-btn" data-view="show">Show's judging</button>
  </div>

  <div class="track-record-wrap">
    <table class="track-record" id="trackRecord"></table>
  </div>

  <div class="legend" id="legend"></div>

  <details class="scoring-info">
    <summary>How scores are calculated</summary>
    <div class="scoring-grid">
      <span>Win</span><span>10 pts</span>
      <span>Top 2</span><span>9 pts</span>
      <span>High</span><span>8 pts</span>
      <span>Safe</span><span>6 pts</span>
      <span>Low</span><span>4 pts</span>
      <span>Bottom 2</span><span>2 pts</span>
      <span>Eliminated</span><span>0 pts</span>
    </div>
    <p class="scoring-note">Averaged across competitive episodes. Bye rounds and deferred bottom placements are excluded from the count.</p>
  </details>
</div>

<div class="nav-wrap"></div>

<script>
// ─────────────────────────────────────────────
// CSV season files live in drag-race/<franchise>/<season>.csv
// manifest.json lists all available seasons.
//
// CSV format — row 1 is headers:
//   Place, Name, Photo, Score, <Episode 1 name>, <Episode 2 name>, ...
// Each subsequent row is one queen.
//
// Valid result values (case-insensitive):
//   WIN | HIGH | HIGH TEAM | SAFE | LOW | BTM2 | ELIM
//   WINNER | RUNNER-UP | ELIM FINAL
//   (empty cell = not yet aired / not applicable)
// ─────────────────────────────────────────────

const RESULT_MAP = {
  "WIN":        { cls: "r-win",        label: "WIN" },
  "TOP2":       { cls: "r-top2",       label: "TOP2" },   // lip sync for the win, didn't win
  "HIGH":       { cls: "r-high",       label: "HIGH" },
  "HIGH TEAM":  { cls: "r-high-team",  label: "HIGH TEAM" },
  "SAFE":       { cls: "r-safe",       label: "SAFE" },
  "BYE":        { cls: "r-bye",        label: "BYE" },    // not in episode, still in running
  "LOW":        { cls: "r-low",        label: "LOW" },
  "BTM":        { cls: "r-btm",        label: "BTM" },    // bottom, lip sync deferred to next ep
  "BTM2":       { cls: "r-btm2",       label: "BTM2" },
  "ELIM":       { cls: "r-elim",       label: "ELIM" },
  "WINNER":     { cls: "r-winner",     label: "Winner" },
  "RUNNER-UP":  { cls: "r-runnerup",   label: "Runner-up" },
  "ELIM FINAL": { cls: "r-elim-final", label: "Eliminated" },
  "TBA": { cls: "r-tba", label: "TBA" },
};

// ── CSV parser (handles quoted fields) ──────
function parseCSV(text) {
  const rows = [];
  for (const line of text.trim().split(/\r?\n/)) {
    const cells = [];
    let cur = "", inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cells.push(cur); cur = "";
      } else {
        cur += ch;
      }
    }
    cells.push(cur);
    rows.push(cells);
  }
  return rows;
}

const EPISODE_SCORES = {
  "WIN": 10, "TOP2": 9, "HIGH": 8, "HIGH TEAM": 8,
  "SAFE": 6, "LOW": 4, "BTM2": 2, "ELIM": 0,
  "WINNER": 10, "RUNNER-UP": 9, "ELIM FINAL": 0,
  // BYE and BTM are skipped (not counted)
};

function calcScore(results) {
  let total = 0, count = 0;
  for (const r of results) {
    const key = r.toUpperCase().trim();
    if (key in EPISODE_SCORES) { total += EPISODE_SCORES[key]; count++; }
  }
  return count > 0 ? +(total / count).toFixed(2) : null;
}

function csvToQueens(text) {
  const rows = parseCSV(text);
  return rows.slice(1).filter(row => row.some(c => c.trim())).map(row => ({
    place:   row[0]?.trim() ?? "",
    name:    row[1]?.trim() ?? "",
    results: row.slice(2).map(r => r?.trim() ?? ""),
  }));
}

function csvToSeason(myText, showText, meta) {
  const rows = parseCSV(myText);
  const episodes = rows[0].slice(2).map((name, i) => ({ num: i + 1, name: name.trim() }));
  const myQueens   = csvToQueens(myText);
  const showQueens = showText ? csvToQueens(showText) : null;

  const queens = myQueens.map((q, i) => {
    const sq = showQueens?.[i] ?? null;
    const myScore   = calcScore(q.results);
    const showScore = sq ? calcScore(sq.results) : null;
    return {
      place:       q.place,
      name:        q.name,
      myResults:   q.results,
      showResults: sq?.results ?? [],
      myScore,
      showScore,
      diff: (myScore !== null && showScore !== null) ? +(myScore - showScore).toFixed(2) : null,
    };
  });
  return { ...meta, episodes, queens };
}

// ── Avatar helpers ───────────────────────────
function initials(name) {
  return name.split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function slugify(name) {
  return name.toLowerCase()
    .replace(/['']/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");
}

function initialsAvatar(name) {
  const hue = Math.abs(name.split("").reduce((a, c) => a + c.charCodeAt(0), 0) % 360);
  return `<div class="queen-initials" style="background:hsl(${hue},38%,60%)">${initials(name)}</div>`;
}

function avatarHTML(name, imageDir) {
  if (!imageDir) return initialsAvatar(name);
  const base = `${imageDir}/${slugify(name)}`;
  // img + sibling initials fallback; onload hides initials, onerror hides img
  return `<img class="queen-avatar" alt="${name}" loading="lazy"
    src="${base}.webp"
    onerror="this.onerror=null;this.src='${base}.jpg';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex'}"
    onload="if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
  >${initialsAvatar(name).replace('<div ', '<div style="display:none" ')}`;
}

// ── Legend ───────────────────────────────────
const LEGEND_META = {
  "WIN":        { color: "var(--c-win)",        text: "Win" },
  "TOP2":       { color: "var(--c-top2)",       text: "Top 2" },
  "HIGH":       { color: "var(--c-high)",       text: "High" },
  "HIGH TEAM":  { color: "var(--c-high)",       text: "High (Team)" },
  "SAFE":       { color: "var(--c-safe)",       text: "Safe" },
  "BYE":        { color: "var(--c-run)",        text: "Bye (not in ep)" },
  "LOW":        { color: "var(--c-low)",        text: "Low" },
  "BTM":        { color: "var(--c-btm)",        text: "Bottom (deferred)" },
  "BTM2":       { color: "var(--c-btm2)",       text: "Bottom 2" },
  "ELIM":       { color: "var(--c-elim)",       text: "Eliminated" },
  "WINNER":     { color: "var(--c-winner)",     text: "Winner" },
  "RUNNER-UP":  { color: "var(--c-runnerup)",   text: "Runner-up" },
  "ELIM FINAL": { color: "var(--c-elim-final)", text: "Elim (Finale)" },
  "TBA": { color: "var(--c-tba)", text: "Upcoming" },
};

function renderLegend(season) {
  const activeResults = currentView === "show" ? q => q.showResults : q => q.myResults;
  const used = new Set(season.queens.flatMap(q => activeResults(q).map(r => r.toUpperCase())));
  const order = Object.keys(LEGEND_META);
  document.getElementById("legend").innerHTML = order
    .filter(key => used.has(key))
    .map(key => {
      const { color, text } = LEGEND_META[key];
      return `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${text}</div>`;
    }).join("");
}

// ── Sort + view state ────────────────────────
let sortCol = "place";   // "place" | "myscore" | "showscore" | "diff"
let sortDir = 1;
let currentView = "my";  // "my" | "show"

function parsePlaceNum(place) {
  if (place.toUpperCase() === "TBA") return 0;
  const m = place.match(/\d+/);
  return m ? parseInt(m[0]) : 999;
}

function arrow(col) {
  if (sortCol !== col) return "";
  // for score cols higher = better so ascending arrow means "best first" which is dir=-1
  const scoreCol = col !== "place";
  return (scoreCol ? sortDir === -1 : sortDir === 1) ? " ↑" : " ↓";
}

function sortedQueens(queens) {
  return [...queens].sort((a, b) => {
    if (sortCol === "myscore")   { const d = (b.myScore ?? -1)   - (a.myScore ?? -1);   return sortDir * d; }
    if (sortCol === "showscore") { const d = (b.showScore ?? -1) - (a.showScore ?? -1); return sortDir * d; }
    if (sortCol === "diff")      { const d = (b.diff ?? -99)     - (a.diff ?? -99);     return sortDir * d; }
    return sortDir * (parsePlaceNum(a.place) - parsePlaceNum(b.place));
  });
}

// ── Render ───────────────────────────────────
let currentSeason_ = null;

function renderTable(season) {
  currentSeason_ = season;
  const hasShow = season.queens.some(q => q.showScore !== null);

  const epNumCells  = season.episodes.map(ep => `<th>${ep.num}</th>`).join("");
  const epNameCells = season.episodes.map(ep => `<th>${ep.name}</th>`).join("");

  const showScoreCols = hasShow ? `
    <th class="col-score sort-th" rowspan="2" data-sort="showscore" data-dir="-1">Show${arrow("showscore")}</th>
    <th class="col-score sort-th" rowspan="2" data-sort="diff" data-dir="-1">Diff${arrow("diff")}</th>` : "";

  const thead = `<thead>
    <tr>
      <th class="col-queen" rowspan="2" style="text-align:left;padding:10px 10px 10px 14px">Queen</th>
      <th class="col-place sort-th" rowspan="2" data-sort="place" data-dir="1">Place${arrow("place")}</th>
      <th class="col-score sort-th" rowspan="2" data-sort="myscore" data-dir="-1">My Score${arrow("myscore")}</th>
      ${showScoreCols}
      ${epNumCells}
    </tr>
    <tr>${epNameCells}</tr>
  </thead>`;

  const rows = sortedQueens(season.queens).map(queen => {
    const results = currentView === "show" && hasShow ? queen.showResults : queen.myResults;
    const epCells = season.episodes.map((_, i) => {
      const raw = (results[i] ?? "").toUpperCase();
      const r = RESULT_MAP[raw];
      if (!r) return `<td class="ep-cell"></td>`;
      return `<td class="ep-cell"><span class="result-badge ${r.cls}">${r.label}</span></td>`;
    }).join("");

    const myDisplay   = queen.myScore   !== null ? queen.myScore.toFixed(2)   : "—";
    const showDisplay = queen.showScore !== null ? queen.showScore.toFixed(2) : "—";
    const diff        = (queen.myScore !== null && queen.showScore !== null)
      ? +(queen.myScore - queen.showScore).toFixed(2) : null;
    const diffDisplay = diff !== null
      ? `<span class="${diff > 0 ? "diff-pos" : diff < 0 ? "diff-neg" : ""}">${diff > 0 ? "+" : ""}${diff.toFixed(2)}</span>`
      : "—";

    const showScoreCells = hasShow ? `
      <td class="col-score"><div class="score-cell">${showDisplay}</div></td>
      <td class="col-score"><div class="score-cell">${diffDisplay}</div></td>` : "";

    return `<tr>
      <td class="col-queen"><div class="queen-cell">${avatarHTML(queen.name, season.imageDir)}<span class="queen-name">${queen.name}</span></div></td>
      <td class="col-place"><div class="place-cell">${queen.place}</div></td>
      <td class="col-score"><div class="score-cell">${myDisplay}</div></td>
      ${showScoreCells}
      ${epCells}
    </tr>`;
  }).join("");

  document.getElementById("trackRecord").innerHTML = thead + `<tbody>${rows}</tbody>`;
  renderLegend(season);

  // Sort click handlers
  document.querySelectorAll(".sort-th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.sort;
      if (sortCol === col) { sortDir *= -1; }
      else { sortCol = col; sortDir = parseInt(th.dataset.dir); }
      renderTable(currentSeason_);
    });
  });

  // View toggle
  const toggleWrap = document.getElementById("viewToggle");
  toggleWrap.style.display = hasShow ? "flex" : "none";
  toggleWrap.querySelectorAll(".view-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.view === currentView);
    btn.onclick = () => { currentView = btn.dataset.view; renderTable(currentSeason_); };
  });
}

function setLoading() {
  document.getElementById("trackRecord").innerHTML =
    `<tbody><tr><td colspan="99" style="padding:40px;text-align:center;font-family:var(--mono);font-size:0.7rem;color:var(--faint)">Loading…</td></tr></tbody>`;
}

// ── Season cache + tab state ─────────────────
const cache = new Map();
let seasons = [];
let currentId = null;

function renderTabs() {
  const wrap = document.getElementById("seasonTabs");
  wrap.innerHTML = seasons.map(s =>
    `<button class="season-tab ${s.id === currentId ? "active" : ""}" data-id="${s.id}" data-path="${s.path}">${s.label}</button>`
  ).join("");
  wrap.querySelectorAll(".season-tab").forEach(btn => {
    btn.addEventListener("click", () => loadSeason(btn.dataset.id));
  });
}

async function loadSeason(id) {
  currentId = id;
  renderTabs();
  if (cache.has(id)) { renderTable(cache.get(id)); return; }
  setLoading();
  const meta = seasons.find(s => s.id === id);
  const fetches = [fetch(meta.path).then(r => r.text())];
  if (meta.showPath) fetches.push(fetch(meta.showPath).then(r => r.text()));
  const [myText, showText = null] = await Promise.all(fetches);
  const season = csvToSeason(myText, showText, { id: meta.id, label: meta.label, imageDir: meta.imageDir || "" });
  cache.set(id, season);
  renderTable(season);
}

// ── Boot ─────────────────────────────────────
fetch("manifest.json")
  .then(r => r.json())
  .then(({ seasons: list }) => {
    seasons = list;
    if (seasons.length === 0) return;
    currentId = seasons[0].id;
    renderTabs();
    loadSeason(seasons[0].id);
  })
  .catch(err => {
    document.getElementById("trackRecord").innerHTML =
      `<tbody><tr><td colspan="99" style="padding:40px;text-align:center;font-family:var(--mono);font-size:0.7rem;color:var(--c-elim)">
        Could not load seasons. If previewing locally, run: <code>npx serve .</code>
      </td></tr></tbody>`;
  });
</script>
<script src="../nav.js"></script>
</body>
</html>
