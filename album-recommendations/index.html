<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Recommendations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 5vw 120px;
    }

    /* ── Header ── */
    .page-title {
      font-family: var(--slab);
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Spin button ── */
    .spin-btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 100px;
      border: 1px solid var(--text);
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: inline-block;
    }

    .spin-btn:hover { opacity: 0.8; }
    .spin-btn:active { transform: scale(0.97); }

    /* ── Picks grid ── */
    .picks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 800px) {
      .picks { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Fade animation ── */
    .picks.spinning .pick-card {
      opacity: 0;
      transform: translateY(6px);
    }

    .pick-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.2s, transform 0.2s;
    }

    .pick-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 20px rgba(26,22,36,0.06);
    }

    /* ── Label ── */
    .pick-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      padding: 14px 14px 0;
    }

    /* ── Cover ── */
    .pick-cover-link {
      display: block;
      margin-top: 10px;
    }

    .pick-cover-link.no-cover {
      aspect-ratio: 1;
      background: var(--surface2);
      margin-top: 10px;
    }

    .pick-cover {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    /* ── Card body ── */
    .pick-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .pick-album {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }

    .pick-artist {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.3;
    }

    .pick-rank {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: var(--faint);
      margin-top: 4px;
    }

    .pick-calbumdar-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      margin-top: 10px;
    }

    .pick-songs {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .pick-song {
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--faint);
      line-height: 1.4;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 40px;
    }

    .slot-selects {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .slot-select {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 10px;
      cursor: pointer;
      appearance: none;
      transition: border-color 0.12s, color 0.12s;
    }

    .slot-select:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    /* ── Diagnostic ── */
    .diag {
      margin-top: 60px;
    }

    .diag-summary {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--faint);
      cursor: pointer;
      user-select: none;
    }

    .diag-table {
      margin-top: 12px;
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    .diag-table th {
      text-align: left;
      font-weight: 400;
      color: var(--faint);
      border-bottom: 1px solid var(--border);
      padding: 4px 10px 4px 0;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .diag-table th:hover { color: var(--muted); }
    .diag-table th.sort-asc::after  { content: ' ↑'; }
    .diag-table th.sort-desc::after { content: ' ↓'; }

    .diag-table td {
      padding: 4px 10px 4px 0;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
  </style>
</head>
<body>

<div class="page">
  <h1 class="page-title">What To Listen To</h1>
  <p class="page-sub">Suggestions for when I don't know what to listen to</p>

  <div class="controls">
    <button class="spin-btn" id="spin-btn">↻ Spin</button>
    <div class="slot-selects">
      <select class="slot-select" data-slot="0">
        <option value="year">Released This Year</option>
        <option value="favourites">All-time Favourites</option>
        <option value="revisit-or-rediscover">Revisit / Rediscover</option>
        <option value="revisit">Revisit</option>
        <option value="rediscover">Rediscover</option>
        <option value="new">New To Me</option>
        <option value="stale">Haven't Heard In A While</option>
      </select>
      <select class="slot-select" data-slot="1">
        <option value="year">Released This Year</option>
        <option value="favourites" selected>All-time Favourites</option>
        <option value="revisit-or-rediscover">Revisit / Rediscover</option>
        <option value="revisit">Revisit</option>
        <option value="rediscover">Rediscover</option>
        <option value="new">New To Me</option>
        <option value="stale">Haven't Heard In A While</option>
      </select>
      <select class="slot-select" data-slot="2">
        <option value="year">Released This Year</option>
        <option value="favourites">All-time Favourites</option>
        <option value="revisit-or-rediscover" selected>Revisit / Rediscover</option>
        <option value="revisit">Revisit</option>
        <option value="rediscover">Rediscover</option>
        <option value="new">New To Me</option>
        <option value="stale">Haven't Heard In A While</option>
      </select>
      <select class="slot-select" data-slot="3">
        <option value="year">Released This Year</option>
        <option value="favourites">All-time Favourites</option>
        <option value="revisit-or-rediscover">Revisit / Rediscover</option>
        <option value="revisit">Revisit</option>
        <option value="rediscover">Rediscover</option>
        <option value="new" selected>New To Me</option>
      </select>
    </div>
  </div>

  <div class="picks" id="picks"></div>

  <details class="diag">
    <summary class="diag-summary">All albums</summary>
    <table class="diag-table">
      <thead>
        <tr><th data-col="date">Date</th><th data-col="year">Year</th><th data-col="artist">Artist</th><th data-col="album">Album</th><th data-col="weight">Weight</th><th data-col="flags">Flags</th><th data-col="lastPlayed">Last Played</th></tr>
      </thead>
      <tbody id="diag-body"></tbody>
    </table>
  </details>
</div>

<div class="nav-wrap"></div>

<script src="albums.js"></script>
<script src="lastfm-cache.js"></script>
<script>
  function toSlug(str) {
    return str
      .toLowerCase()
      .replace(/ß/g, 'ss')
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, '')
      .trim()
      .replace(/\s+/g, '-');
  }

  function coverSrc(entry) {
    const file = entry.cover || (toSlug(entry.album) + '.jpg');
    return '../images/albums/' + entry.year + '/' + file;
  }

  function weightedRandom(pool, weightFn) {
    weightFn = weightFn || (a => a.weight);
    const weights = pool.map(a => weightFn(a) ** 2);
    const total = weights.reduce((s, w) => s + w, 0);
    if (total === 0) return null;
    let r = Math.random() * total;
    for (let i = 0; i < pool.length; i++) {
      r -= weights[i];
      if (r <= 0) return pool[i];
    }
    return pool[pool.length - 1];
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function pickHtml(label, a) {
    const img = `<img class="pick-cover" src="${coverSrc(a)}" alt="${a.album}" loading="lazy" onerror="this.parentElement.classList.add('no-cover');this.remove()">`;
    const coverWrap = a.spotify
      ? `<a href="${a.spotify}" target="_blank" rel="noopener" class="pick-cover-link">${img}</a>`
      : `<div class="pick-cover-link">${img}</div>`;
    const songs = a.songs && a.songs.length
      ? `<div class="pick-songs">${a.songs.map(s => `<div class="pick-song">${s}</div>`).join('')}</div>`
      : '';
    return `
      <div class="pick-card">
        <div class="pick-label">${label}</div>
        ${coverWrap}
        <div class="pick-body">
          <div class="pick-album">${a.album}</div>
          <div class="pick-artist">${a.artist}</div>
          ${a.rank != null ? `<div class="pick-calbumdar-label">Calbumdar Stats:</div>` : ''}
          <div class="pick-rank">${a.rank != null ? '#' + a.rank + ' of ' + a.year : a.date ? formatDate(a.date) : a.year}</div>
          ${songs}
        </div>
      </div>
    `;
  }

  const cache = (typeof LASTFM_CACHE !== 'undefined') ? LASTFM_CACHE : {};

  function lastPlayedTs(a) {
    return cache[a.artist + '|||' + a.album];
  }

  function spin() {
    const container = document.getElementById('picks');

    // Fade out
    container.classList.add('spinning');

    setTimeout(function () {
      const listened   = ALBUMS.filter(a => !a.unlistened);
      const unlistened = ALBUMS.filter(a => a.unlistened);
      const years      = [...new Set(listened.map(a => a.year))].sort((a, b) => b - a);
      const latestYear = years[0];

      const now = Date.now() / 1000;
      const staleThreshold = now - 180 * 24 * 60 * 60; // 6 months ago

      function freshnessMultiplier(a) {
        const lp = lastPlayedTs(a) ?? 0;
        if (lp > now - 7   * 24 * 60 * 60) return 0;    // heard in last week
        if (lp > now - 90  * 24 * 60 * 60) return 0.25; // heard in last 3 months
        if (lp > now - 180 * 24 * 60 * 60) return 0.5;  // heard in last 6 months
        return 1;
      }

      function poolFor(type) {
        switch (type) {
          case 'year':                  return ALBUMS.filter(a => a.year === latestYear);
          case 'favourites':            return listened.filter(a => a.weight === 5 && !a.rediscover);
          case 'revisit-or-rediscover': return listened.filter(a => a.weight < 5 || a.rediscover);
          case 'revisit':               return listened.filter(a => a.weight < 5 && !a.rediscover);
          case 'rediscover':            return listened.filter(a => a.rediscover);
          case 'new':                   return unlistened;
          case 'stale':                 return listened.filter(a => (lastPlayedTs(a) ?? 0) < staleThreshold);
        }
      }

      function labelFor(type, album) {
        switch (type) {
          case 'year':                  return 'Released This Year';
          case 'favourites':            return 'All-time Favourites';
          case 'revisit-or-rediscover': return album.rediscover ? 'Rediscover' : 'Revisit';
          case 'revisit':               return 'Revisit';
          case 'rediscover':            return 'Rediscover';
          case 'new':                   return 'New To Me';
          case 'stale':                 return "Haven't Heard In A While";
        }
      }

      const slotTypes = [...document.querySelectorAll('.slot-select')].map(s => s.value);
      const picked = [];
      const picks = [];

      slotTypes.forEach(type => {
        const pool = poolFor(type).filter(a => !picked.includes(a));
        if (!pool.length) return;
        const album = weightedRandom(pool, a => a.weight * freshnessMultiplier(a));
        picked.push(album);
        picks.push(pickHtml(labelFor(type, album), album));
      });

      container.innerHTML = picks.join('');
      container.classList.remove('spinning');
    }, 200);
  }

  spin();
  document.getElementById('spin-btn').addEventListener('click', spin);

  // ── Diagnostic table ──
  let diagSort = { col: 'year', dir: -1 };

  function renderDiag() {
    const sorted = [...ALBUMS].sort((a, b) => {
      const col = diagSort.col;
      let av = col === 'flags'      ? [a.unlistened ? 'unlistened' : '', a.rediscover ? 'rediscover' : ''].filter(Boolean).join(',')
             : col === 'date'       ? (a.date ?? '')
             : col === 'lastPlayed' ? (lastPlayedTs(a) ?? 0)
             : (a[col] ?? '');
      let bv = col === 'flags'      ? [b.unlistened ? 'unlistened' : '', b.rediscover ? 'rediscover' : ''].filter(Boolean).join(',')
             : col === 'date'       ? (b.date ?? '')
             : col === 'lastPlayed' ? (lastPlayedTs(b) ?? 0)
             : (b[col] ?? '');
      if (av < bv) return -diagSort.dir;
      if (av > bv) return  diagSort.dir;
      return 0;
    });

    document.getElementById('diag-body').innerHTML = sorted.map(a => {
      const flags = [a.unlistened ? 'unlistened' : '', a.rediscover ? 'rediscover' : ''].filter(Boolean).join(', ');
      const lp = lastPlayedTs(a);
      const lpDisplay = lp ? formatDate(new Date(lp * 1000).toISOString().slice(0, 10)) : '—';
      return `<tr>
        <td>${a.date ?? '—'}</td>
        <td>${a.year}</td>
        <td>${a.artist}</td>
        <td>${a.album}</td>
        <td>${a.weight}</td>
        <td>${flags}</td>
        <td>${lpDisplay}</td>
      </tr>`;
    }).join('');

    document.querySelectorAll('.diag-table th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      if (th.dataset.col === diagSort.col) th.classList.add(diagSort.dir === 1 ? 'sort-asc' : 'sort-desc');
    });
  }

  document.querySelectorAll('.diag-table th').forEach(th => {
    th.addEventListener('click', () => {
      if (diagSort.col === th.dataset.col) diagSort.dir *= -1;
      else diagSort = { col: th.dataset.col, dir: 1 };
      renderDiag();
    });
  });

  renderDiag();
</script>
<script src="../nav.js"></script>
</body>
</html>
