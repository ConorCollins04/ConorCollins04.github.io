<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f1f8;
      --surface: #faf9fd;
      --border: rgba(80,60,120,0.1);
      --border-hover: rgba(80,60,120,0.25);
      --text: #1a1624;
      --muted: #6b6278;
      --faint: #b0a8be;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10vw 120px;
      max-width: 820px;
      margin: 0 auto;
    }

    .home-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 28px;
    }

    h1 strong { font-weight: 500; }

    .home-desc {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.85;
      max-width: 380px;
    }
  </style>
</head>
<body>

  <div class="home">
    <h1>Hi<br>
  </div>

  <div class="nav-wrap">
    <nav class="nav-pill">
      <a href="index.html" class="nav-btn active">Home</a>
      <div class="nav-group" id="survivor-group">
        <button class="nav-btn" id="survivor-trigger">Survivor</button>
        <div class="nav-flyout" id="survivor-flyout">
          <a href="survivor-all-stars.html" class="nav-sub-btn">All-Stars Casting</a>
          <a href="survivor-moments.html" class="nav-sub-btn">Moments</a>
        </div>
      </div>
      <a href="oscars.html" class="nav-btn">Oscars</a>
      <a href="concerts.html" class="nav-btn">Concerts</a>
      <div class="nav-group" id="drag-group">
        <button class="nav-btn" id="drag-trigger">Drag</button>
        <div class="nav-flyout" id="drag-flyout">
          <a href="drag-race.html" class="nav-sub-btn">Drag Race</a>
          <a href="drag-shows.html" class="nav-sub-btn">Live Shows</a>
        </div>
      </div>
    </nav>
  </div>

<script>
  (function() {
    var g = document.getElementById('survivor-group');
    var t = document.getElementById('survivor-trigger');
    var f = document.getElementById('survivor-flyout');
    if (f.querySelector('.active')) { f.classList.add('open'); t.classList.add('active'); }
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();
  (function() {
    var g = document.getElementById('drag-group');
    var t = document.getElementById('drag-trigger');
    var f = document.getElementById('drag-flyout');
    if (f.querySelector('.active')) { f.classList.add('open'); t.classList.add('active'); }
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();
</script>
</body>
</html>
