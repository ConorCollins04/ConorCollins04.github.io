<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f1f8;
      --surface: #faf9fd;
      --border: rgba(80,60,120,0.1);
      --border-hover: rgba(80,60,120,0.25);
      --text: #1a1624;
      --muted: #6b6278;
      --faint: #b0a8be;
      --nav-bg: #1a1624;
      --nav-muted: rgba(243,241,248,0.38);
      --nav-active-bg: #f3f1f8;
      --nav-active-text: #1a1624;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10vw 120px;
      max-width: 820px;
      margin: 0 auto;
    }

    .home-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 28px;
    }

    h1 strong { font-weight: 500; }

    .home-desc {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.85;
      max-width: 380px;
    }

    /* ── Nav pill ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--nav-bg);
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--nav-muted);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      font-weight: 500;
    }

    .nav-group { position: relative; }

    .nav-flyout {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--nav-bg);
      border-radius: 12px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
      min-width: max-content;
    }

    .nav-flyout.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .nav-sub-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--nav-muted);
      background: none;
      border: none;
      border-radius: 8px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      display: block;
    }

    .nav-sub-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-sub-btn.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="home">
    <h1>Hi<br>
  </div>

  <div class="nav-wrap">
    <nav class="nav-pill">
      <a href="index.html" class="nav-btn active">Home</a>
      <div class="nav-group" id="survivor-group">
        <button class="nav-btn" id="survivor-trigger">Survivor</button>
        <div class="nav-flyout" id="survivor-flyout">
          <a href="survivor-all-stars.html" class="nav-sub-btn">All-Stars Casting</a>
          <a href="survivor-moments.html" class="nav-sub-btn">Moments</a>
        </div>
      </div>
      <a href="oscars.html" class="nav-btn">Oscars</a>
      <a href="concerts.html" class="nav-btn">Concerts</a>
      <a href="drag-race.html" class="nav-btn">Drag Race</a>
    </nav>
  </div>

<script>
  (function() {
    var g = document.getElementById('survivor-group');
    var t = document.getElementById('survivor-trigger');
    var f = document.getElementById('survivor-flyout');
    if (f.querySelector('.active')) { f.classList.add('open'); t.classList.add('active'); }
    t.addEventListener('click', function(e) { e.stopPropagation(); f.classList.toggle('open'); });
    document.addEventListener('click', function(e) { if (!g.contains(e.target)) f.classList.remove('open'); });
  })();
</script>
</body>
</html>
