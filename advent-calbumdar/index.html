<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advent Calbumdar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 5vw 120px;
    }

    /* ── Header ── */
    .page-title {
      font-family: var(--slab);
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Year tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .tab {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }

    .tab:hover { border-color: var(--border-hover); color: var(--text); }

    .tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── Calendar grid ── */
    .calendar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    @media (max-width: 700px) {
      .calendar { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 460px) {
      .calendar { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Door card ── */
    .door {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .door:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 20px rgba(26,22,36,0.06);
    }

    .door.top-three {
      border-color: rgba(80,60,120,0.25);
    }

    /* ── Cover image ── */
    .door-cover {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .door-cover-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Card body ── */
    .door-body {
      padding: 10px 11px 11px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      flex: 1;
    }

    .door-day {
      display: flex;
      align-items: baseline;
      gap: 3px;
      margin-bottom: 4px;
    }

    .door-day-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: var(--faint);
      text-transform: uppercase;
    }

    .door-day-num {
      font-family: var(--slab);
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1;
      color: var(--faint);
    }

    .door.top-three .door-day-label,
    .door.top-three .door-day-num { color: var(--muted); }

    .door-rank {
      position: absolute;
      top: 10px;
      right: 10px;
      font-family: var(--mono);
      font-size: 0.55rem;
      color: var(--faint);
      letter-spacing: 0.04em;
    }

    .door.top-three .door-rank { color: var(--muted); }

    .door-album {
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }

    .door-artist {
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.3;
    }

    .door-songs {
      margin-top: 5px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .door-song {
      font-size: 0.62rem;
      font-weight: 300;
      color: var(--faint);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .door-note {
      font-size: 0.62rem;
      font-weight: 300;
      color: var(--faint);
      font-style: italic;
      line-height: 1.3;
      margin-top: 3px;
    }
  </style>
</head>
<body>

<div class="page">
  <h1 class="page-title">Advent Calbumdar</h1>
  <p class="page-sub">My top 24 albums of the year, counted down from Dec 1 to Dec 24</p>

  <div class="tabs" id="year-tabs"></div>
  <div class="calendar" id="calendar"></div>
</div>

<div class="nav-wrap"></div>

<script src="data.js"></script>
<script>
  const years = Object.keys(CALBUMDAR).map(Number).sort((a, b) => b - a);
  let activeYear = years[0];

  function renderTabs() {
    const tabs = document.getElementById('year-tabs');
    tabs.innerHTML = years.map(y => `
      <button class="tab ${y === activeYear ? 'active' : ''}" data-year="${y}">${y}</button>
    `).join('');
    tabs.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeYear = Number(btn.dataset.year);
        renderTabs();
        renderCalendar();
      });
    });
  }

  function renderCalendar() {
    const calendar = document.getElementById('calendar');
    const albums = CALBUMDAR[activeYear];

    // Order by day: Dec 1 = rank 24, Dec 24 = rank 1
    const sorted = [...albums].sort((a, b) => b.rank - a.rank);

    calendar.innerHTML = sorted.map(entry => {
      const dayNum = 25 - entry.rank;
      const isTop3 = entry.rank <= 3;

      const coverHtml = entry.cover
        ? `<img class="door-cover" src="${entry.cover}" alt="${entry.album}" loading="lazy">`
        : `<div class="door-cover-placeholder"></div>`;

      const songsHtml = entry.songs && entry.songs.length
        ? `<div class="door-songs">${entry.songs.map(s => `<div class="door-song">${s}</div>`).join('')}</div>`
        : '';

      return `
        <div class="door ${isTop3 ? 'top-three' : ''}">
          ${coverHtml}
          <div class="door-body">
            <div class="door-day">
              <span class="door-day-label">Day</span>
              <span class="door-day-num">${dayNum}</span>
            </div>
            <span class="door-rank">#${entry.rank}</span>
            <div class="door-album">${entry.album}</div>
            <div class="door-artist">${entry.artist}</div>
            ${songsHtml}
            ${entry.note ? `<div class="door-note">${entry.note}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  renderTabs();
  renderCalendar();
</script>
<script src="../nav.js"></script>
</body>
</html>
