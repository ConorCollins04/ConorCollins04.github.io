<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advent Calbumdar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 5vw 120px;
    }

    /* ── Header ── */
    .page-title {
      font-family: var(--slab);
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Year tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .tab {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }

    .tab:hover { border-color: var(--border-hover); color: var(--text); }

    .tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── Calendar grid ── */
    .calendar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    @media (max-width: 700px) {
      .calendar { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 460px) {
      .calendar { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── By-artist layout ── */
    .calendar.by-artist {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .artist-row-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .artist-row-albums {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .artist-row-albums .door {
      flex: 0 0 140px;
    }

    /* ── Door card ── */
    .door {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .door:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 20px rgba(26,22,36,0.06);
    }


    /* ── Cover image ── */
    .door-cover-link { display: block; }

    .door-cover {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .door-cover-link.no-cover,
    .door-cover-link:empty {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface2);
    }

    /* ── Card body ── */
    .door-body {
      padding: 10px 11px 11px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      flex: 1;
    }

    .door-day {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .door.top-three .door-day { color: var(--muted); }

    .door-rank {
      font-family: var(--slab);
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1;
      color: var(--text);
      margin-bottom: 6px;
    }

    .door.top-three .door-rank { color: var(--text); }

    .door-album {
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }

    .door-artist {
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.3;
    }

    .door-songs {
      margin-top: 5px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .door-song {
      font-size: 0.62rem;
      font-weight: 300;
      color: var(--faint);
      line-height: 1.4;
    }

    .door-note {
      font-size: 0.62rem;
      font-weight: 300;
      color: var(--faint);
      font-style: italic;
      line-height: 1.3;
      margin-top: 3px;
    }
  </style>
</head>
<body>

<div class="page">
  <h1 class="page-title">Advent Calbumdar</h1>
  <p class="page-sub">My top 24 albums of the year, counted down from Dec 1 to Dec 24</p>

  <div class="tabs" id="year-tabs"></div>
  <div class="calendar" id="calendar"></div>
</div>

<div class="nav-wrap"></div>

<script src="../album-recommendations/albums.js"></script>
<script>
  const CALBUMDAR = {};
  ALBUMS.filter(a => a.rank != null).forEach(a => {
    const year = new Date(a.date).getFullYear();
    if (!CALBUMDAR[year]) CALBUMDAR[year] = [];
    CALBUMDAR[year].push(a);
  });

  function toSlug(str) {
    return str
      .toLowerCase()
      .replace(/ß/g, 'ss')
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, '')
      .trim()
      .replace(/\s+/g, '-');
  }

  function coverSrc(entry, year) {
    const file = entry.cover || (toSlug(entry.album) + '.jpg');
    return '../images/albums/' + year + '/' + file;
  }

  const years = Object.keys(CALBUMDAR).map(Number).sort((a, b) => b - a);
  let activeYear = 'all';

  function renderTabs() {
    const tabs = document.getElementById('year-tabs');
    tabs.innerHTML =
      `<button class="tab ${activeYear === 'all' ? 'active' : ''}" data-year="all">All</button>` +
      years.map(y => `<button class="tab ${y === activeYear ? 'active' : ''}" data-year="${y}">${y}</button>`).join('') +
      `<button class="tab ${activeYear === 'by-artist' ? 'active' : ''}" data-year="by-artist">By Artist</button>`;
    tabs.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.year;
        activeYear = (v === 'all' || v === 'by-artist') ? v : Number(v);
        renderTabs();
        renderCalendar();
      });
    });
  }

  function doorHtml(entry, year, labelHtml) {
    const img = `<img class="door-cover" src="${coverSrc(entry, year)}" alt="${entry.album}" loading="lazy" onerror="this.parentElement.classList.add('no-cover');this.remove()">`;
    const coverHtml = entry.spotify
      ? `<a href="${entry.spotify}" target="_blank" rel="noopener" class="door-cover-link">${img}</a>`
      : img;
    const songsHtml = entry.songs && entry.songs.length
      ? `<div class="door-songs">${entry.songs.map(s => `<div class="door-song">${s}</div>`).join('')}</div>`
      : '';
    return `
      <div class="door top-three">
        ${coverHtml}
        <div class="door-body">
          ${labelHtml}
          <div class="door-album">${entry.album}</div>
          <div class="door-artist">${entry.artist}</div>
          ${songsHtml}
          ${entry.note ? `<div class="door-note">${entry.note}</div>` : ''}
        </div>
      </div>
    `;
  }

  function renderCalendar() {
    const calendar = document.getElementById('calendar');
    calendar.className = 'calendar';

    if (activeYear === 'by-artist') {
      calendar.className = 'calendar by-artist';
      const allAlbums = years.flatMap(y => CALBUMDAR[y].map(a => Object.assign({ _year: y }, a)));
      const byArtist = {};
      allAlbums.forEach(a => {
        if (!byArtist[a.artist]) byArtist[a.artist] = [];
        byArtist[a.artist].push(a);
      });
      const artistGroups = Object.entries(byArtist)
        .filter(([, albs]) => albs.length > 1)
        .sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
      calendar.innerHTML = artistGroups.map(([artist, albs]) => {
        const sorted = [...albs].sort((a, b) => b._year - a._year || a.rank - b.rank);
        const albumsHtml = sorted.map(a =>
          doorHtml(a, a._year, `<div class="door-day">${a._year} · #${a.rank}</div>`)
        ).join('');
        return `<div class="artist-row">
          <div class="artist-row-label">${artist} · ${albs.length} entries</div>
          <div class="artist-row-albums">${albumsHtml}</div>
        </div>`;
      }).join('');
      return;
    }

    if (activeYear === 'all') {
      calendar.innerHTML = years.map(y => {
        const entry = CALBUMDAR[y].find(e => e.rank === 1);
        return doorHtml(entry, y, `<div class="door-day">#1 of ${y}</div>`);
      }).join('');
      return;
    }

    const albums = CALBUMDAR[activeYear];
    const sorted = [...albums].sort((a, b) => a.rank - b.rank);
    calendar.innerHTML = sorted.map(entry => {
      const dayNum = 25 - entry.rank;
      const isTop3 = entry.rank <= 3;
      const img = `<img class="door-cover" src="${coverSrc(entry, activeYear)}" alt="${entry.album}" loading="lazy" onerror="this.parentElement.classList.add('no-cover');this.remove()">`;
      const coverHtml = entry.spotify
        ? `<a href="${entry.spotify}" target="_blank" rel="noopener" class="door-cover-link">${img}</a>`
        : img;
      const songsHtml = entry.songs && entry.songs.length
        ? `<div class="door-songs">${entry.songs.map(s => `<div class="door-song">${s}</div>`).join('')}</div>`
        : '';
      return `
        <div class="door ${isTop3 ? 'top-three' : ''}">
          ${coverHtml}
          <div class="door-body">
            <div class="door-day">Day ${dayNum}</div>
            <div class="door-rank">#${entry.rank}</div>
            <div class="door-album">${entry.album}</div>
            <div class="door-artist">${entry.artist}</div>
            ${songsHtml}
            ${entry.note ? `<div class="door-note">${entry.note}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  renderTabs();
  renderCalendar();
</script>
<script src="../nav.js"></script>
</body>
</html>
