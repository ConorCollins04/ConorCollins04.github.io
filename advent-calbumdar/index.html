<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advent Calbumdar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 5vw 120px;
    }

    /* ── Header ── */
    .page-title {
      font-family: var(--slab);
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Year tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .tab {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }

    .tab:hover { border-color: var(--border-hover); color: var(--text); }

    .tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* ── Calendar grid ── */
    .calendar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    @media (max-width: 700px) {
      .calendar { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 480px) {
      .calendar { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Door card ── */
    .door {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.12s, box-shadow 0.12s;
      position: relative;
      min-height: 110px;
    }

    .door:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 20px rgba(26,22,36,0.06);
    }

    .door.top-three {
      border-color: rgba(80,60,120,0.25);
      background: var(--surface2);
    }

    .door-date {
      font-family: var(--slab);
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1;
      color: var(--faint);
    }

    .door.top-three .door-date { color: var(--muted); }

    .door-album {
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
      margin-top: auto;
    }

    .door-artist {
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.3;
    }

    .door-rank {
      position: absolute;
      top: 10px;
      right: 12px;
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--faint);
      letter-spacing: 0.04em;
    }

    .door.top-three .door-rank { color: var(--muted); }

    .door-note {
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--faint);
      font-style: italic;
      line-height: 1.3;
    }
  </style>
</head>
<body>

<div class="page">
  <h1 class="page-title">Advent Calbumdar</h1>
  <p class="page-sub">My top 24 albums of the year, counted down from Dec 1 to Dec 24</p>

  <div class="tabs" id="year-tabs"></div>
  <div class="calendar" id="calendar"></div>
</div>

<div class="nav-wrap"></div>

<script src="data.js"></script>
<script>
  const years = Object.keys(CALBUMDAR).map(Number).sort((a, b) => b - a);
  let activeYear = years[0];

  function renderTabs() {
    const tabs = document.getElementById('year-tabs');
    tabs.innerHTML = years.map(y => `
      <button class="tab ${y === activeYear ? 'active' : ''}" data-year="${y}">${y}</button>
    `).join('');
    tabs.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeYear = Number(btn.dataset.year);
        renderTabs();
        renderCalendar();
      });
    });
  }

  function renderCalendar() {
    const calendar = document.getElementById('calendar');
    const albums = CALBUMDAR[activeYear];

    // Sort by door date order (Dec 1 = rank 24, Dec 24 = rank 1)
    // door date = 25 - rank
    const sorted = [...albums].sort((a, b) => a.rank - b.rank).reverse();
    // sorted[0] is rank 24 (Dec 1), sorted[23] is rank 1 (Dec 24)

    calendar.innerHTML = sorted.map(entry => {
      const doorNum = 25 - entry.rank;
      const isTop3 = entry.rank <= 3;
      return `
        <div class="door ${isTop3 ? 'top-three' : ''}">
          <div class="door-date">${doorNum}</div>
          <span class="door-rank">#${entry.rank}</span>
          <div class="door-album">${entry.album}</div>
          <div class="door-artist">${entry.artist}</div>
          ${entry.note ? `<div class="door-note">${entry.note}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  renderTabs();
  renderCalendar();
</script>
<script src="../nav.js"></script>
</body>
</html>
