<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concerts — Conor Collins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f1f8;
      --surface:       #faf9fd;
      --surface2:      #f0eef6;
      --border:        rgba(80,60,120,0.1);
      --border-hover:  rgba(80,60,120,0.28);
      --text:          #1a1624;
      --muted:         #6b6278;
      --faint:         #b0a8be;
      --slab:  'Alfa Slab One', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Page layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 10vw 100px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .view-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .view-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .view-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Empty state ── */
    .empty-state {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.04em;
      padding: 48px 0;
    }

    /* ── Group section (year / artist / venue) ── */
    .group-section {
      margin-bottom: 40px;
    }

    .group-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .group-title {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .group-count {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--faint);
    }

    /* ── Concert row ── */
    .concert-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 0 20px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }

    .concert-row:last-child { border-bottom: none; }

    .concert-date {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      padding-top: 2px;
      white-space: nowrap;
    }

    .concert-main { min-width: 0; }

    .concert-artist {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    /* In artist view, show venue prominently; in venue view, show artist prominently */
    .concert-secondary {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 1px;
    }

    .concert-openers {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.03em;
      color: var(--faint);
      margin-top: 4px;
      line-height: 1.5;
    }

    .opener-label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    .guest-label {
      letter-spacing: 0.03em;
      margin-right: 4px;
    }

    .opener-toggle {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 0 48px;
      display: block;
      transition: color 0.12s;
    }
    .opener-toggle:hover { color: var(--muted); }
    .opener-toggle.filtered { color: var(--text); }

    .person-filter-select {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: color 0.12s;
    }
    .person-filter-select:hover { color: var(--muted); }
    .person-filter-select.filtered { color: var(--text); }
    .person-filter-select option { color: var(--text); background: var(--surface); }

    .concert-role {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      margin-top: 3px;
    }

    /* ── Stats view ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
    }

    .stat-card.full-width { grid-column: 1 / -1; }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 10px;
    }

    .stat-number {
      font-family: var(--slab);
      font-size: 2.4rem;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-names {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .stat-sub {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      margin-top: 5px;
    }

    .stat-city-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .stat-city-row:last-child { border-bottom: none; }
    .stat-city-name { font-weight: 400; color: var(--text); }
    .stat-city-count { font-family: var(--mono); font-size: 0.62rem; color: var(--faint); }

    .stat-seated-row {
      display: flex;
      gap: 48px;
      margin-top: 4px;
    }

    .stat-bar-row {
      display: grid;
      grid-template-columns: 30px 1fr 22px;
      gap: 8px;
      align-items: center;
      padding: 4px 0;
    }
    .stat-bar-label {
      font-family: var(--mono);
      font-size: 0.57rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      text-align: right;
    }
    .stat-bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
    }
    .stat-bar-fill {
      height: 100%;
      background: var(--text);
      border-radius: 3px;
    }
    .stat-bar-count {
      font-family: var(--mono);
      font-size: 0.57rem;
      color: var(--faint);
      text-align: right;
    }

    /* ── Floating nav ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #1a1624;
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(243,241,248,0.38);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Concerts</h1>
      <p class="page-subtitle" id="subtitle">Loading…</p>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="year">Diary</button>
      <button class="view-btn" data-view="artist">Artists</button>
      <button class="view-btn" data-view="venue">Venues</button>
      <button class="view-btn" data-view="stats">Stats</button>
    </div>
  </div>

  <div id="artist-filter-toggle" style="display:none; margin-bottom: 8px;">
    <div class="view-toggle">
      <button class="view-btn active" data-filter="all">All</button>
      <button class="view-btn" data-filter="headlining">Headlining</button>
    </div>
  </div>
  <div id="person-filter-wrap" style="margin-bottom: 20px;">
    <select id="person-filter-select" class="person-filter-select">
      <option value="">went with…</option>
    </select>
  </div>

  <div id="secondary-sort-toggle" style="display:none; margin-bottom: 20px;">
    <div class="view-toggle">
      <button class="view-btn active" data-sort="alpha">A–Z</button>
      <button class="view-btn" data-sort="count">Most shows</button>
    </div>
  </div>

  <div id="concerts-view"></div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="survivor-all-stars.html" class="nav-btn">Survivor All-Stars Casting</a>
    <a href="oscars.html" class="nav-btn">Oscars</a>
    <a href="concerts.html" class="nav-btn active">Concerts</a>
  </nav>
</div>

<script src="concerts-data.js"></script>
<script>
  let currentView = "year";
  let secondarySort = "alpha";
  let artistFilter = "all";
  let personFilter = null;

  // ── Helpers ──────────────────────────────────────────────────────────────

  function formatDate(dateStr) {
    // dateStr: "YYYY-MM-DD"
    const [y, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}, ${y}`;
  }

  function formatShortDate(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}`;
  }

  function getYear(dateStr) {
    return dateStr.split("-")[0];
  }

  function groupBy(arr, keyFn) {
    const map = new Map();
    for (const item of arr) {
      const k = keyFn(item);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(item);
    }
    return map;
  }

  function sortedByDate(arr, desc = false) {
    return [...arr].sort((a, b) => desc
      ? b.date.localeCompare(a.date)
      : a.date.localeCompare(b.date));
  }

  // ── Render ────────────────────────────────────────────────────────────────

  // entry: { show, role: "headliner"|"opener", headliner?: string }
  // show is either a concert { artist, venue, city, date, openers }
  //                 or a festival { festival, venue, city, date, headliners, support }
  function buildRow(entry) {
    const { show, role = "headliner", headliner, flat = false, guest = false, member = false } = entry;
    const isFestival = !!show.festival;

    const row = document.createElement("div");
    row.className = "concert-row";

    const dateEl = document.createElement("div");
    dateEl.className = "concert-date";

    const main = document.createElement("div");
    main.className = "concert-main";

    if (currentView === "year") {
      dateEl.textContent = formatShortDate(show.date);

      const primaryEl = document.createElement("div");
      primaryEl.className = "concert-artist";
      primaryEl.textContent = isFestival ? show.festival : show.artist;
      main.appendChild(primaryEl);

      const venue = document.createElement("div");
      venue.className = "concert-secondary";
      venue.textContent = show.venue + (show.city ? ` · ${show.city}` : "");
      main.appendChild(venue);

      // w/ line
      const allArtists = isFestival
        ? [...(show.headliners || []), ...(show.support || []), ...(show.artists || [])]
        : (show.openers || []);
      if (allArtists.length > 0) {
        const op = document.createElement("div");
        op.className = "concert-openers";
        op.innerHTML = `<span class="opener-label">w/</span>${allArtists.join(", ")}`;
        main.appendChild(op);
      }
      if ((show.guests || []).length > 0) {
        const g = document.createElement("div");
        g.className = "concert-openers";
        g.innerHTML = `<span class="guest-label">Guest:</span>${show.guests.join(", ")}`;
        main.appendChild(g);
      }

    } else if (currentView === "artist") {
      dateEl.textContent = formatDate(show.date);

      const primaryEl = document.createElement("div");
      primaryEl.className = "concert-artist";
      primaryEl.textContent = isFestival ? show.festival : show.venue;
      main.appendChild(primaryEl);

      if (show.city) {
        const city = document.createElement("div");
        city.className = "concert-secondary";
        city.textContent = show.city;
        main.appendChild(city);
      }

      if (role === "opener") {
        const roleEl = document.createElement("div");
        roleEl.className = "concert-role";
        roleEl.textContent = guest
          ? (isFestival ? `guest at ${show.festival}` : `guest with ${show.artist}`)
          : flat ? `performed at ${show.festival}`
          : isFestival ? `support at ${show.festival}`
          : `opened for ${headliner}`;
        main.appendChild(roleEl);
      } else if (role === "member") {
        const roleEl = document.createElement("div");
        roleEl.className = "concert-role";
        roleEl.textContent = `as part of ${show.artist}`;
        main.appendChild(roleEl);
      }

    } else {
      // venue view
      dateEl.textContent = formatDate(show.date);

      const primaryEl = document.createElement("div");
      primaryEl.className = "concert-artist";
      primaryEl.textContent = isFestival ? show.festival : show.artist;
      main.appendChild(primaryEl);

      const allArtists = isFestival
        ? [...(show.headliners || []), ...(show.support || []), ...(show.artists || [])]
        : (show.openers || []);
      if (allArtists.length > 0) {
        const op = document.createElement("div");
        op.className = "concert-openers";
        op.innerHTML = `<span class="opener-label">w/</span>${allArtists.join(", ")}`;
        main.appendChild(op);
      }
      if ((show.guests || []).length > 0) {
        const g = document.createElement("div");
        g.className = "concert-openers";
        g.innerHTML = `<span class="guest-label">Guest:</span>${show.guests.join(", ")}`;
        main.appendChild(g);
      }
    }

    row.appendChild(dateEl);
    row.appendChild(main);
    return row;
  }

  function buildSection(title, count, entries) {
    const section = document.createElement("div");
    section.className = "group-section";

    const header = document.createElement("div");
    header.className = "group-header";

    const titleEl = document.createElement("div");
    titleEl.className = "group-title";
    titleEl.textContent = title;

    const countEl = document.createElement("div");
    countEl.className = "group-count";
    countEl.textContent = count === 1 ? "1 show" : `${count} shows`;

    header.appendChild(titleEl);
    header.appendChild(countEl);
    section.appendChild(header);

    for (const entry of entries) {
      // Accept both plain show objects (year/venue views) and { show, role } entries (artist view)
      section.appendChild(buildRow(entry.show ? entry : { show: entry }));
    }

    return section;
  }

  function renderStats() {
    const container = document.getElementById("concerts-view");
    container.innerHTML = "";

    // 1. Most seen artist (all roles)
    const artistCount = new Map();
    const addArtist = (name) => artistCount.set(name, (artistCount.get(name) || 0) + 1);
    for (const show of CONCERTS) {
      if (show.artist) addArtist(show.artist);
      for (const a of (show.headliners || [])) addArtist(a);
      for (const a of (show.support   || [])) addArtist(a);
      for (const a of (show.artists   || [])) addArtist(a);
      for (const a of (show.openers   || [])) addArtist(a);
      for (const a of (show.guests    || [])) addArtist(a);
      for (const a of (show.members   || [])) addArtist(a);
    }
    const maxSeen = Math.max(...artistCount.values());
    const topSeen = [...artistCount.entries()].filter(([,c]) => c === maxSeen).map(([n]) => n).sort();

    // 2. Most seen as headliner
    const headlinerCount = new Map();
    const addH = (name) => headlinerCount.set(name, (headlinerCount.get(name) || 0) + 1);
    for (const show of CONCERTS) {
      if (show.artist) addH(show.artist);
      for (const a of (show.headliners || [])) addH(a);
    }
    const maxHL = Math.max(...headlinerCount.values());
    const topHL = [...headlinerCount.entries()].filter(([,c]) => c === maxHL).map(([n]) => n).sort();

    // 3. Most visited venue
    const venueCount = new Map();
    for (const show of CONCERTS) {
      venueCount.set(show.venue, (venueCount.get(show.venue) || 0) + 1);
    }
    const maxVenue = Math.max(...venueCount.values());
    const topVenues = [...venueCount.entries()].filter(([,c]) => c === maxVenue).map(([n]) => n).sort();

    // 4. Shows by city
    const cityCount = new Map();
    for (const show of CONCERTS) {
      const city = show.city || "Unknown";
      cityCount.set(city, (cityCount.get(city) || 0) + 1);
    }
    const cities = [...cityCount.entries()].sort((a, b) => b[1] - a[1]);

    // 5. Seated vs standing
    const seatedCount   = CONCERTS.filter(s => s.seated).length;
    const standingCount = CONCERTS.length - seatedCount;

    // 6. Shows by month
    const monthCount = new Array(12).fill(0);
    for (const show of CONCERTS) {
      monthCount[parseInt(show.date.split("-")[1]) - 1]++;
    }
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const maxMonth = Math.max(...monthCount);

    // 7. Festivals
    const festivalCount = CONCERTS.filter(s => s.festival).length;

    // Build grid
    const grid = document.createElement("div");
    grid.className = "stats-grid";

    function makeCard(label, number, names, sub, fullWidth = false) {
      const card = document.createElement("div");
      card.className = "stat-card" + (fullWidth ? " full-width" : "");

      const labelEl = document.createElement("div");
      labelEl.className = "stat-label";
      labelEl.textContent = label;

      const numEl = document.createElement("div");
      numEl.className = "stat-number";
      numEl.textContent = number;

      const namesEl = document.createElement("div");
      namesEl.className = "stat-names";
      namesEl.textContent = names;

      card.appendChild(labelEl);
      card.appendChild(numEl);
      card.appendChild(namesEl);

      if (sub) {
        const subEl = document.createElement("div");
        subEl.className = "stat-sub";
        subEl.textContent = sub;
        card.appendChild(subEl);
      }
      return card;
    }

    function makeBarCard(label, data, maxVal, fullWidth = false) {
      const card = document.createElement("div");
      card.className = "stat-card" + (fullWidth ? " full-width" : "");
      const labelEl = document.createElement("div");
      labelEl.className = "stat-label";
      labelEl.textContent = label;
      card.appendChild(labelEl);
      for (const { name, count } of data) {
        const row = document.createElement("div");
        row.className = "stat-bar-row";
        const lbl = document.createElement("div");
        lbl.className = "stat-bar-label";
        lbl.textContent = name;
        const track = document.createElement("div");
        track.className = "stat-bar-track";
        const fill = document.createElement("div");
        fill.className = "stat-bar-fill";
        fill.style.width = maxVal > 0 ? `${(count / maxVal) * 100}%` : "0%";
        track.appendChild(fill);
        const cnt = document.createElement("div");
        cnt.className = "stat-bar-count";
        cnt.textContent = count || "";
        row.appendChild(lbl);
        row.appendChild(track);
        row.appendChild(cnt);
        card.appendChild(row);
      }
      return card;
    }

    grid.appendChild(makeCard("Most seen artist", maxSeen, topSeen.join(", ")));
    grid.appendChild(makeCard("Most seen headliner", maxHL, topHL.join(", ")));

    // Most visited venue — with chronological headliners as subtext
    const venueHeadliners = topVenues.map(v => {
      const shows = CONCERTS.filter(s => s.venue === v).sort((a, b) => a.date.localeCompare(b.date));
      const names = shows.map(s => s.artist || (s.headliners || []).join(" & ") || s.festival);
      return topVenues.length > 1 ? `${v}: ${names.join(", ")}` : names.join(", ");
    }).join(" · ");
    grid.appendChild(makeCard("Most visited venue", maxVenue, topVenues.join(", "), venueHeadliners));

    // Shows by city card
    const cityCard = document.createElement("div");
    cityCard.className = "stat-card";
    const cityLabel = document.createElement("div");
    cityLabel.className = "stat-label";
    cityLabel.textContent = "Shows by city";
    cityCard.appendChild(cityLabel);
    for (const [city, count] of cities) {
      const row = document.createElement("div");
      row.className = "stat-city-row";
      const nameEl = document.createElement("span");
      nameEl.className = "stat-city-name";
      nameEl.textContent = city;
      const countEl = document.createElement("span");
      countEl.className = "stat-city-count";
      countEl.textContent = count;
      row.appendChild(nameEl);
      row.appendChild(countEl);
      cityCard.appendChild(row);
    }
    grid.appendChild(cityCard);

    // Shows by month bar chart
    const monthData = monthNames.map((name, i) => ({ name, count: monthCount[i] }));
    grid.appendChild(makeBarCard("Shows by month", monthData, maxMonth, true));

    // Festivals count
    grid.appendChild(makeCard("Festivals attended", festivalCount, ""));

    // Seated vs standing card
    const seatedCard = document.createElement("div");
    seatedCard.className = "stat-card";
    const seatedLabel = document.createElement("div");
    seatedLabel.className = "stat-label";
    seatedLabel.textContent = "Seated vs standing";
    seatedCard.appendChild(seatedLabel);
    const seatedRow = document.createElement("div");
    seatedRow.className = "stat-seated-row";
    for (const [n, lbl] of [[seatedCount, "seated"], [standingCount, "standing"]]) {
      const item = document.createElement("div");
      const numEl = document.createElement("div");
      numEl.className = "stat-number";
      numEl.textContent = n;
      const subEl = document.createElement("div");
      subEl.className = "stat-sub";
      subEl.textContent = lbl;
      item.appendChild(numEl);
      item.appendChild(subEl);
      seatedRow.appendChild(item);
    }
    seatedCard.appendChild(seatedRow);
    grid.appendChild(seatedCard);

    container.appendChild(grid);
  }

  function render() {
    const container = document.getElementById("concerts-view");
    container.innerHTML = "";

    if (currentView === "stats") { renderStats(); return; }

    if (!CONCERTS || CONCERTS.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No shows yet — add entries to concerts-data.js";
      container.appendChild(empty);
      return;
    }

    const sorted = sortedByDate(CONCERTS, true); // newest first by default

    if (currentView === "year") {
      const filtered = personFilter === "__alone__"
        ? sorted.filter(s => !s.with || s.with.length === 0)
        : personFilter
          ? sorted.filter(s => (s.with || []).includes(personFilter))
          : sorted;
      const byYear = groupBy(filtered, s => getYear(s.date));
      const years = [...byYear.keys()].sort((a, b) => b - a);
      for (const year of years) {
        const shows = byYear.get(year); // already newest-first within year
        container.appendChild(buildSection(year, shows.length, shows));
      }

    } else if (currentView === "artist") {
      // Build map including opener appearances
      const byArtist = new Map();
      const addEntry = (name, entry) => {
        if (!byArtist.has(name)) byArtist.set(name, []);
        byArtist.get(name).push(entry);
      };
      for (const show of CONCERTS) {
        if (show.festival) {
          for (const artist of (show.headliners || [])) {
            addEntry(artist, { show, role: "headliner" });
          }
          for (const artist of (show.support || [])) {
            addEntry(artist, { show, role: "opener" });
          }
          for (const artist of (show.artists || [])) {
            addEntry(artist, { show, role: "opener", flat: true });
          }
          for (const artist of (show.guests || [])) {
            addEntry(artist, { show, role: "opener", guest: true });
          }
        } else {
          addEntry(show.artist, { show, role: "headliner" });
          for (const opener of (show.openers || [])) {
            addEntry(opener, { show, role: "opener", headliner: show.artist });
          }
          for (const artist of (show.guests || [])) {
            addEntry(artist, { show, role: "opener", guest: true });
          }
          for (const member of (show.members || [])) {
            addEntry(member, { show, role: "member" });
          }
        }
      }

      const filteredCount = (a) => artistFilter === "headlining"
        ? byArtist.get(a).filter(e => e.role === "headliner" || e.role === "member").length
        : byArtist.get(a).length;
      const allArtists = [...byArtist.keys()].sort((a, b) => secondarySort === "count"
        ? filteredCount(b) - filteredCount(a) || a.localeCompare(b)
        : a.localeCompare(b));
      const headliners   = allArtists.filter(a => byArtist.get(a).some(e => e.role === "headliner" || e.role === "member"));
      const openerOnly   = allArtists.filter(a => byArtist.get(a).every(e => e.role === "opener"));

      for (const artist of headliners) {
        let entries = byArtist.get(artist).sort((a, b) => b.show.date.localeCompare(a.show.date));
        if (artistFilter === "headlining") {
          entries = entries.filter(e => e.role === "headliner" || e.role === "member");
        }
        container.appendChild(buildSection(artist, entries.length, entries));
      }

      if (artistFilter === "headlining") return;

      if (openerOnly.length > 0) {
        // Collapsible opener-only block
        const openerWrap = document.createElement("div");
        openerWrap.id = "opener-only-sections";
        openerWrap.style.display = "none";
        for (const artist of openerOnly) {
          const entries = byArtist.get(artist).sort((a, b) => b.show.date.localeCompare(a.show.date));
          openerWrap.appendChild(buildSection(artist, entries.length, entries));
        }
        container.appendChild(openerWrap);

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "opener-toggle";
        toggleBtn.dataset.count = openerOnly.length;
        toggleBtn.textContent = `show ${openerOnly.length} support act${openerOnly.length !== 1 ? "s" : ""}`;
        toggleBtn.addEventListener("click", () => {
          const open = openerWrap.style.display === "none";
          openerWrap.style.display = open ? "" : "none";
          toggleBtn.textContent = open
            ? `hide support act${openerOnly.length !== 1 ? "s" : ""}`
            : `show ${openerOnly.length} support act${openerOnly.length !== 1 ? "s" : ""}`;
        });
        container.appendChild(toggleBtn);
      }

    } else {
      const byVenue = groupBy(sortedByDate(CONCERTS), s => s.venue);
      const venues = [...byVenue.keys()].sort((a, b) => secondarySort === "count"
        ? byVenue.get(b).length - byVenue.get(a).length || a.localeCompare(b)
        : a.localeCompare(b));
      for (const venue of venues) {
        const shows = sortedByDate(byVenue.get(venue), true);
        const city = shows[0].city;
        const title = city ? `${venue} · ${city}` : venue;
        container.appendChild(buildSection(title, shows.length, shows));
      }
    }
  }

  function updateSubtitle() {
    const total = CONCERTS ? CONCERTS.length : 0;
    if (total === 0) {
      document.getElementById("subtitle").textContent = "Add your shows to concerts-data.js";
      return;
    }

    const headliners = new Set();
    const everyone   = new Set();
    for (const s of CONCERTS) {
      if (s.artist) {
        headliners.add(s.artist);
        everyone.add(s.artist);
      }
      for (const a of (s.headliners || [])) { headliners.add(a); everyone.add(a); }
      for (const a of [...(s.openers || []), ...(s.support || []), ...(s.artists || []), ...(s.guests || [])]) {
        everyone.add(a);
      }
    }
    const venues = new Set(CONCERTS.map(s => s.venue));

    document.getElementById("subtitle").textContent =
      `${total} show${total !== 1 ? "s" : ""} · ${headliners.size} headliner${headliners.size !== 1 ? "s" : ""} · ${everyone.size} artist${everyone.size !== 1 ? "s" : ""} · ${venues.size} venue${venues.size !== 1 ? "s" : ""}`;
  }

  // ── View toggle ───────────────────────────────────────────────────────────

  function buildPersonSelect() {
    const countMap = new Map();
    for (const s of CONCERTS) {
      for (const p of (s.with || [])) {
        countMap.set(p, (countMap.get(p) || 0) + 1);
      }
    }
    const aloneCount = CONCERTS.filter(s => !s.with || s.with.length === 0).length;
    const people = [...countMap.keys()].sort((a, b) => countMap.get(b) - countMap.get(a));
    const select = document.getElementById("person-filter-select");
    select.innerHTML = `<option value="">went with…</option>`;

    // Merge "Nobody" into the sorted list by count
    const allOptions = [
      { value: "__alone__", label: `Nobody (${aloneCount})`, count: aloneCount },
      ...people.map(p => ({ value: p, label: `${p} (${countMap.get(p)})`, count: countMap.get(p) }))
    ].sort((a, b) => b.count - a.count);

    for (const { value, label } of allOptions) {
      const opt = document.createElement("option");
      opt.value = value;
      opt.textContent = label;
      if (value === personFilter) opt.selected = true;
      select.appendChild(opt);
    }
    select.classList.toggle("filtered", personFilter !== null);
  }

  document.getElementById("person-filter-select").addEventListener("change", (e) => {
    personFilter = e.target.value || null;
    e.target.classList.toggle("filtered", personFilter !== null);
    render();
  });

  document.querySelectorAll("#artist-filter-toggle .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      artistFilter = btn.dataset.filter;
      document.querySelectorAll("#artist-filter-toggle .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  document.querySelectorAll("#secondary-sort-toggle .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      secondarySort = btn.dataset.sort;
      document.querySelectorAll("#secondary-sort-toggle .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  document.querySelectorAll(".page-header .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll(".page-header .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      // Reset secondary sort and filter when switching views
      secondarySort = "alpha";
      document.querySelectorAll("#secondary-sort-toggle .view-btn").forEach(b => b.classList.toggle("active", b.dataset.sort === "alpha"));
      document.getElementById("secondary-sort-toggle").style.display = (currentView === "venue" || currentView === "artist") ? "" : "none";
      artistFilter = "all";
      document.querySelectorAll("#artist-filter-toggle .view-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === "all"));
      document.getElementById("artist-filter-toggle").style.display = currentView === "artist" ? "" : "none";
      personFilter = null;
      document.getElementById("person-filter-select").value = "";
      document.getElementById("person-filter-select").classList.remove("filtered");
      const wrap = document.getElementById("person-filter-wrap");
      wrap.style.display = currentView === "year" ? "" : "none";
      if (currentView === "stats") {
        document.getElementById("secondary-sort-toggle").style.display = "none";
        document.getElementById("artist-filter-toggle").style.display = "none";
      }
      if (currentView === "year") buildPersonSelect();
      render();
    });
  });

  updateSubtitle();
  buildPersonSelect();
  render();
</script>
</body>
</html>
