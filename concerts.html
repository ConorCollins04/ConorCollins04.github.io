<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concerts — Conor Collins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f3f1f8;
      --surface:       #faf9fd;
      --surface2:      #f0eef6;
      --border:        rgba(80,60,120,0.1);
      --border-hover:  rgba(80,60,120,0.28);
      --text:          #1a1624;
      --muted:         #6b6278;
      --faint:         #b0a8be;
      --slab:  'Alfa Slab One', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Page layout ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 10vw 100px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .view-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .view-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .view-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── Empty state ── */
    .empty-state {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.04em;
      padding: 48px 0;
    }

    /* ── Group section (year / artist / venue) ── */
    .group-section {
      margin-bottom: 40px;
    }

    .group-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .group-title {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .group-count {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--faint);
    }

    /* ── Concert row ── */
    .concert-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 0 20px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }

    .concert-row:last-child { border-bottom: none; }

    .concert-date {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      padding-top: 2px;
      white-space: nowrap;
    }

    .concert-main { min-width: 0; }

    .concert-artist {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    /* In artist view, show venue prominently; in venue view, show artist prominently */
    .concert-secondary {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 1px;
    }

    .concert-openers {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.03em;
      color: var(--faint);
      margin-top: 4px;
      line-height: 1.5;
    }

    .opener-label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    .guest-label {
      letter-spacing: 0.03em;
      margin-right: 4px;
    }

    .opener-toggle {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 0 48px;
      display: block;
      transition: color 0.12s;
    }
    .opener-toggle:hover { color: var(--muted); }

    .concert-role {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      margin-top: 3px;
    }

    /* ── Floating nav ── */
    .nav-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #1a1624;
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 4px 24px rgba(26,22,36,0.18), 0 1px 4px rgba(26,22,36,0.1);
    }

    .nav-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(243,241,248,0.38);
      background: none;
      border: none;
      border-radius: 100px;
      padding: 7px 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      display: block;
    }

    .nav-btn:hover { color: rgba(243,241,248,0.8); }

    .nav-btn.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Concerts</h1>
      <p class="page-subtitle" id="subtitle">Loading…</p>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="year">Year</button>
      <button class="view-btn" data-view="artist">Artist</button>
      <button class="view-btn" data-view="venue">Venue</button>
    </div>
  </div>

  <div id="artist-filter-toggle" style="display:none; margin-bottom: 8px;">
    <div class="view-toggle">
      <button class="view-btn active" data-filter="all">All</button>
      <button class="view-btn" data-filter="headlining">Headlining</button>
    </div>
  </div>
  <div id="secondary-sort-toggle" style="display:none; margin-bottom: 20px;">
    <div class="view-toggle">
      <button class="view-btn active" data-sort="alpha">A–Z</button>
      <button class="view-btn" data-sort="count">Most shows</button>
    </div>
  </div>

  <div id="concerts-view"></div>
</div>

<div class="nav-wrap">
  <nav class="nav-pill">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="survivor-all-stars.html" class="nav-btn">Survivor All-Stars Casting</a>
    <a href="oscars.html" class="nav-btn">Oscars</a>
    <a href="concerts.html" class="nav-btn active">Concerts</a>
  </nav>
</div>

<script src="concerts-data.js"></script>
<script>
  let currentView = "year";
  let secondarySort = "alpha";
  let artistFilter = "all";

  // ── Helpers ──────────────────────────────────────────────────────────────

  function formatDate(dateStr) {
    // dateStr: "YYYY-MM-DD"
    const [y, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}, ${y}`;
  }

  function formatShortDate(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m - 1]} ${d}`;
  }

  function getYear(dateStr) {
    return dateStr.split("-")[0];
  }

  function groupBy(arr, keyFn) {
    const map = new Map();
    for (const item of arr) {
      const k = keyFn(item);
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(item);
    }
    return map;
  }

  function sortedByDate(arr, desc = false) {
    return [...arr].sort((a, b) => desc
      ? b.date.localeCompare(a.date)
      : a.date.localeCompare(b.date));
  }

  // ── Render ────────────────────────────────────────────────────────────────

  // entry: { show, role: "headliner"|"opener", headliner?: string }
  // show is either a concert { artist, venue, city, date, openers }
  //                 or a festival { festival, venue, city, date, headliners, support }
  function buildRow(entry) {
    const { show, role = "headliner", headliner, flat = false, guest = false, member = false } = entry;
    const isFestival = !!show.festival;

    const row = document.createElement("div");
    row.className = "concert-row";

    const dateEl = document.createElement("div");
    dateEl.className = "concert-date";

    const main = document.createElement("div");
    main.className = "concert-main";

    if (currentView === "year") {
      dateEl.textContent = formatShortDate(show.date);

      const primaryEl = document.createElement("div");
      primaryEl.className = "concert-artist";
      primaryEl.textContent = isFestival ? show.festival : show.artist;
      main.appendChild(primaryEl);

      const venue = document.createElement("div");
      venue.className = "concert-secondary";
      venue.textContent = show.venue + (show.city ? ` · ${show.city}` : "");
      main.appendChild(venue);

      // w/ line
      const allArtists = isFestival
        ? [...(show.headliners || []), ...(show.support || []), ...(show.artists || [])]
        : (show.openers || []);
      if (allArtists.length > 0) {
        const op = document.createElement("div");
        op.className = "concert-openers";
        op.innerHTML = `<span class="opener-label">w/</span>${allArtists.join(", ")}`;
        main.appendChild(op);
      }
      if ((show.guests || []).length > 0) {
        const g = document.createElement("div");
        g.className = "concert-openers";
        g.innerHTML = `<span class="guest-label">Guest:</span>${show.guests.join(", ")}`;
        main.appendChild(g);
      }

    } else if (currentView === "artist") {
      dateEl.textContent = formatDate(show.date);

      const primaryEl = document.createElement("div");
      primaryEl.className = "concert-artist";
      primaryEl.textContent = isFestival ? show.festival : show.venue;
      main.appendChild(primaryEl);

      if (show.city) {
        const city = document.createElement("div");
        city.className = "concert-secondary";
        city.textContent = show.city;
        main.appendChild(city);
      }

      if (role === "opener") {
        const roleEl = document.createElement("div");
        roleEl.className = "concert-role";
        roleEl.textContent = guest
          ? (isFestival ? `guest at ${show.festival}` : `guest with ${show.artist}`)
          : flat ? `performed at ${show.festival}`
          : isFestival ? `support at ${show.festival}`
          : `opened for ${headliner}`;
        main.appendChild(roleEl);
      } else if (role === "member") {
        const roleEl = document.createElement("div");
        roleEl.className = "concert-role";
        roleEl.textContent = `as part of ${show.artist}`;
        main.appendChild(roleEl);
      }

    } else {
      // venue view
      dateEl.textContent = formatDate(show.date);

      const primaryEl = document.createElement("div");
      primaryEl.className = "concert-artist";
      primaryEl.textContent = isFestival ? show.festival : show.artist;
      main.appendChild(primaryEl);

      const allArtists = isFestival
        ? [...(show.headliners || []), ...(show.support || []), ...(show.artists || [])]
        : (show.openers || []);
      if (allArtists.length > 0) {
        const op = document.createElement("div");
        op.className = "concert-openers";
        op.innerHTML = `<span class="opener-label">w/</span>${allArtists.join(", ")}`;
        main.appendChild(op);
      }
      if ((show.guests || []).length > 0) {
        const g = document.createElement("div");
        g.className = "concert-openers";
        g.innerHTML = `<span class="guest-label">Guest:</span>${show.guests.join(", ")}`;
        main.appendChild(g);
      }
    }

    row.appendChild(dateEl);
    row.appendChild(main);
    return row;
  }

  function buildSection(title, count, entries) {
    const section = document.createElement("div");
    section.className = "group-section";

    const header = document.createElement("div");
    header.className = "group-header";

    const titleEl = document.createElement("div");
    titleEl.className = "group-title";
    titleEl.textContent = title;

    const countEl = document.createElement("div");
    countEl.className = "group-count";
    countEl.textContent = count === 1 ? "1 show" : `${count} shows`;

    header.appendChild(titleEl);
    header.appendChild(countEl);
    section.appendChild(header);

    for (const entry of entries) {
      // Accept both plain show objects (year/venue views) and { show, role } entries (artist view)
      section.appendChild(buildRow(entry.show ? entry : { show: entry }));
    }

    return section;
  }

  function render() {
    const container = document.getElementById("concerts-view");
    container.innerHTML = "";

    if (!CONCERTS || CONCERTS.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No shows yet — add entries to concerts-data.js";
      container.appendChild(empty);
      return;
    }

    const sorted = sortedByDate(CONCERTS, true); // newest first by default

    if (currentView === "year") {
      const byYear = groupBy(sorted, s => getYear(s.date));
      const years = [...byYear.keys()].sort((a, b) => b - a);
      for (const year of years) {
        const shows = byYear.get(year); // already newest-first within year
        container.appendChild(buildSection(year, shows.length, shows));
      }

    } else if (currentView === "artist") {
      // Build map including opener appearances
      const byArtist = new Map();
      const addEntry = (name, entry) => {
        if (!byArtist.has(name)) byArtist.set(name, []);
        byArtist.get(name).push(entry);
      };
      for (const show of CONCERTS) {
        if (show.festival) {
          for (const artist of (show.headliners || [])) {
            addEntry(artist, { show, role: "headliner" });
          }
          for (const artist of (show.support || [])) {
            addEntry(artist, { show, role: "opener" });
          }
          for (const artist of (show.artists || [])) {
            addEntry(artist, { show, role: "opener", flat: true });
          }
          for (const artist of (show.guests || [])) {
            addEntry(artist, { show, role: "opener", guest: true });
          }
        } else {
          addEntry(show.artist, { show, role: "headliner" });
          for (const opener of (show.openers || [])) {
            addEntry(opener, { show, role: "opener", headliner: show.artist });
          }
          for (const artist of (show.guests || [])) {
            addEntry(artist, { show, role: "opener", guest: true });
          }
          for (const member of (show.members || [])) {
            addEntry(member, { show, role: "member" });
          }
        }
      }

      const allArtists = [...byArtist.keys()].sort((a, b) => secondarySort === "count"
        ? byArtist.get(b).length - byArtist.get(a).length || a.localeCompare(b)
        : a.localeCompare(b));
      const headliners   = allArtists.filter(a => byArtist.get(a).some(e => e.role === "headliner" || e.role === "member"));
      const openerOnly   = allArtists.filter(a => byArtist.get(a).every(e => e.role === "opener"));

      for (const artist of headliners) {
        let entries = byArtist.get(artist).sort((a, b) => b.show.date.localeCompare(a.show.date));
        if (artistFilter === "headlining") {
          entries = entries.filter(e => e.role === "headliner" || e.role === "member");
        }
        container.appendChild(buildSection(artist, entries.length, entries));
      }

      if (artistFilter === "headlining") return;

      if (openerOnly.length > 0) {
        // Collapsible opener-only block
        const openerWrap = document.createElement("div");
        openerWrap.id = "opener-only-sections";
        openerWrap.style.display = "none";
        for (const artist of openerOnly) {
          const entries = byArtist.get(artist).sort((a, b) => b.show.date.localeCompare(a.show.date));
          openerWrap.appendChild(buildSection(artist, entries.length, entries));
        }
        container.appendChild(openerWrap);

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "opener-toggle";
        toggleBtn.dataset.count = openerOnly.length;
        toggleBtn.textContent = `show ${openerOnly.length} support act${openerOnly.length !== 1 ? "s" : ""}`;
        toggleBtn.addEventListener("click", () => {
          const open = openerWrap.style.display === "none";
          openerWrap.style.display = open ? "" : "none";
          toggleBtn.textContent = open
            ? `hide support act${openerOnly.length !== 1 ? "s" : ""}`
            : `show ${openerOnly.length} support act${openerOnly.length !== 1 ? "s" : ""}`;
        });
        container.appendChild(toggleBtn);
      }

    } else {
      const byVenue = groupBy(sortedByDate(CONCERTS), s => s.venue);
      const venues = [...byVenue.keys()].sort((a, b) => secondarySort === "count"
        ? byVenue.get(b).length - byVenue.get(a).length || a.localeCompare(b)
        : a.localeCompare(b));
      for (const venue of venues) {
        const shows = sortedByDate(byVenue.get(venue), true);
        const city = shows[0].city;
        const title = city ? `${venue} · ${city}` : venue;
        container.appendChild(buildSection(title, shows.length, shows));
      }
    }
  }

  function updateSubtitle() {
    const total = CONCERTS ? CONCERTS.length : 0;
    if (total === 0) {
      document.getElementById("subtitle").textContent = "Add your shows to concerts-data.js";
      return;
    }

    const headliners = new Set();
    const everyone   = new Set();
    for (const s of CONCERTS) {
      if (s.artist) {
        headliners.add(s.artist);
        everyone.add(s.artist);
      }
      for (const a of (s.headliners || [])) { headliners.add(a); everyone.add(a); }
      for (const a of [...(s.openers || []), ...(s.support || []), ...(s.artists || []), ...(s.guests || [])]) {
        everyone.add(a);
      }
    }
    const venues = new Set(CONCERTS.map(s => s.venue));

    document.getElementById("subtitle").textContent =
      `${total} show${total !== 1 ? "s" : ""} · ${headliners.size} headliner${headliners.size !== 1 ? "s" : ""} · ${everyone.size} artist${everyone.size !== 1 ? "s" : ""} · ${venues.size} venue${venues.size !== 1 ? "s" : ""}`;
  }

  // ── View toggle ───────────────────────────────────────────────────────────

  document.querySelectorAll("#artist-filter-toggle .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      artistFilter = btn.dataset.filter;
      document.querySelectorAll("#artist-filter-toggle .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  document.querySelectorAll("#secondary-sort-toggle .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      secondarySort = btn.dataset.sort;
      document.querySelectorAll("#secondary-sort-toggle .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  document.querySelectorAll(".page-header .view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll(".page-header .view-btn").forEach(b => b.classList.toggle("active", b === btn));
      // Reset secondary sort and filter when switching views
      secondarySort = "alpha";
      document.querySelectorAll("#secondary-sort-toggle .view-btn").forEach(b => b.classList.toggle("active", b.dataset.sort === "alpha"));
      document.getElementById("secondary-sort-toggle").style.display = (currentView === "venue" || currentView === "artist") ? "" : "none";
      artistFilter = "all";
      document.querySelectorAll("#artist-filter-toggle .view-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === "all"));
      document.getElementById("artist-filter-toggle").style.display = currentView === "artist" ? "" : "none";
      render();
    });
  });

  updateSubtitle();
  render();
</script>
</body>
</html>
