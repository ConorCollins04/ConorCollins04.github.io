<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor All-Stars Casting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 284px;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ── Left pool ── */
    .pool {
      padding: 56px 40px 40px 10vw;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .pool-header { margin-bottom: 28px; }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .pool-subtitle {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Season tabs */
    .season-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .season-tab {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .season-tab:hover { border-color: var(--border-hover); color: var(--text); }
    .season-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .season-heading { margin-bottom: 20px; }

    .season-heading h2 {
      font-family: var(--slab);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
    }

    .season-heading p {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--faint);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    /* Tribe sections */
    .tribe-section { margin-bottom: 26px; }

    .tribe-label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
    }

    .tribe-swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tribe-name {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Player grid */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 6px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 8px 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      text-align: center;
      user-select: none;
    }

    .player-card:hover:not(.selected):not(.disabled) {
      border-color: var(--border-hover);
      background: var(--surface2);
      box-shadow: 0 2px 8px rgba(80,60,120,0.07);
    }

    .player-card.selected {
      background: var(--text);
      border-color: var(--text);
    }

    .player-card.disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img, .cast-slot-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .player-card.selected .avatar {
      background: rgba(255,255,255,0.1) !important;
      color: rgba(243,241,248,0.9) !important;
    }

    .player-name {
      font-size: 0.68rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--text);
    }
    .player-name-last { font-weight: 300; color: var(--muted); }
    .player-card.selected .player-name { color: var(--bg); }
    .player-card.selected .player-name-last { color: rgba(243,241,248,0.6); }

    .check-mark {
      font-family: var(--mono);
      font-size: 0.55rem;
      color: rgba(243,241,248,0.5);
      opacity: 0;
      height: 11px;
      letter-spacing: 0.04em;
    }
    .player-card.selected .check-mark { opacity: 1; }

    /* ── Right cast panel ── */
    .cast-panel {
      padding: 56px 20px 40px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .cast-panel-header { margin-bottom: 18px; }

    .cast-panel-header h2 {
      font-family: var(--slab);
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
    }

    .cast-counts { display: flex; gap: 14px; }

    .cast-count {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .cast-count span { color: var(--text); }
    .cast-count.full span { color: #5a7a3a; }

    .cast-section { margin-bottom: 14px; }

    .cast-section-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
      margin-bottom: 6px;
    }

    .cast-slots { display: flex; flex-direction: column; gap: 3px; }

    .cast-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      min-height: 36px;
    }

    .cast-slot.empty {
      background: none;
      border-style: dashed;
    }

    .cast-slot-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.5rem;
      flex-shrink: 0;
    }

    .cast-slot-info { flex: 1; min-width: 0; }

    .cast-slot-name {
      font-size: 0.7rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .cast-slot-sub {
      font-family: var(--mono);
      font-size: 0.56rem;
      color: var(--faint);
      letter-spacing: 0.03em;
      line-height: 1.5;
    }

    .cast-slot-empty-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--faint);
      letter-spacing: 0.05em;
    }

    .remove-btn {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 3px;
      line-height: 1;
      transition: color 0.1s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--text); }

    .cast-footer {
      margin-top: auto;
      padding-top: 16px;
      display: flex;
      gap: 16px;
    }
    .reset-btn {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: color 0.1s;
    }
    .reset-btn:hover { color: var(--text); }
  /* ── Continue button ── */
  .continue-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .continue-btn:disabled { opacity: 0.22; cursor: not-allowed; }
  .continue-btn:not(:disabled):hover { opacity: 0.82; }

  /* ── Tribes phase ── */
  #tribes-phase { background: var(--bg); min-height: 100vh; }
  .tribes-layout { padding: 56px 8vw 100px; }

  .tribes-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 32px;
  }
  .tribes-header-left { flex: 1; }
  .tribes-header-left h1 { margin-bottom: 8px; }
  .tribes-header-actions { display: flex; gap: 8px; padding-top: 8px; flex-shrink: 0; }

  .action-btn {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .action-btn:hover { border-color: var(--border-hover); color: var(--text); }

  .tribe-pool-section { margin-bottom: 28px; }
  .tribe-pool-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .tribe-pool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 6px;
    min-height: 64px;
    padding: 8px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .tribe-pool-grid.drag-over { border-color: var(--border-hover); background: var(--surface2); }
  .tribe-pool-empty {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--faint);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    letter-spacing: 0.04em;
  }

  .tribe-columns { display: grid; gap: 14px; }

  .tribe-col {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .tribe-col.drag-over { border-color: var(--border-hover); }

  .tribe-col-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 9px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tribe-col-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .tribe-col-name { font-family: var(--slab); font-size: 0.88rem; font-weight: 400; color: var(--text); flex: 1; }
  .tribe-col-count { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.04em; }
  .tribe-col-count.full { color: #5a7a3a; }

  .tribe-col-body { padding: 8px; display: flex; flex-direction: column; gap: 3px; }

  /* Draggable state */
  .draggable { cursor: grab; }
  .draggable:active { cursor: grabbing; }
  .draggable.dragging { opacity: 0.28; }

  .action-btn:disabled { opacity: 0.32; cursor: not-allowed; pointer-events: none; }

  /* ── Share view cards ── */
  .share-tribe-col {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(26,22,36,0.13), 0 1px 4px rgba(26,22,36,0.07);
  }
  .share-tribe-header { padding: 16px 14px 13px; }
  .share-tribe-name { font-family: var(--slab); font-size: 1.1rem; font-weight: 400; line-height: 1; margin-bottom: 3px; }


  .share-player-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
  }
  .share-player-card { background: var(--surface); display: flex; flex-direction: column; }

  .share-player-photo {
    aspect-ratio: 3 / 4;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .share-player-photo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .share-initials {
    font-family: var(--mono);
    font-size: 1rem;
    letter-spacing: 0.04em;
  }
  .share-player-info { padding: 8px 9px 10px; }
  .share-player-name { font-size: 0.68rem; font-weight: 500; line-height: 1.3; color: var(--text); }
  .share-player-name-last { font-weight: 300; color: var(--muted); }
  .share-player-season { font-family: var(--mono); font-size: 0.55rem; color: var(--faint); letter-spacing: 0.04em; margin-top: 2px; }

  /* ── Tag phase ── */
  .tag-tribe-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .tag-tribe-stat { display: flex; align-items: center; gap: 7px; }
  .tag-tribe-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tag-tribe-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .tag-tribe-label span { color: var(--text); }
  .tag-tribe-label.full span { color: #5a7a3a; }
  .tag-tribe-gender { color: var(--faint); font-size: 0.6rem; }

  #tag-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    gap: 8px;
  }
  .tag-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px 8px;
    gap: 6px;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .tag-card-name { font-size: 0.68rem; font-weight: 500; line-height: 1.3; color: var(--text); }
  .tag-card-name-last { font-weight: 300; color: var(--muted); }
  .tag-btns { display: flex; flex-direction: column; gap: 3px; width: 100%; }
  .tag-btn {
    flex: 1;
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.04em;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 2px;
    cursor: pointer;
    background: none;
    color: var(--muted);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tag-btn:hover:not(.active):not([disabled]) { border-color: var(--border-hover); color: var(--text); }
  .tag-btn.active { color: #fff; border-color: transparent; }
  .tag-btn[disabled] { opacity: 0.25; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="layout" id="casting-layout">
  <div class="pool">
    <div class="pool-header">
      <h1 id="pool-title">All-Stars Casting</h1>
      <p class="pool-subtitle" id="pool-subtitle">Draft your ideal 18-person all-star cast, with 9 men and 9 women</p>
    </div>
    <div class="season-tabs" id="mode-tabs" style="margin-bottom:16px"></div>
    <div class="season-tabs" id="season-tabs"></div>
    <div class="season-heading" id="season-heading"></div>
    <div id="player-pool"></div>
  </div>

  <div class="cast-panel">
    <div class="cast-panel-header">
      <h2>Your cast</h2>
      <div class="cast-counts">
        <div class="cast-count" id="count-w">Women: <span>0</span>/9</div>
        <div class="cast-count" id="count-m">Men: <span>0</span>/9</div>
      </div>
    </div>
    <div class="cast-section">
      <div class="cast-section-label">Women</div>
      <div class="cast-slots" id="slots-w"></div>
    </div>
    <div class="cast-section">
      <div class="cast-section-label">Men</div>
      <div class="cast-slots" id="slots-m"></div>
    </div>
    <div class="cast-footer">
      <button class="reset-btn" id="reset-btn">↺ clear all</button>
      <button class="reset-btn" id="randomize-cast-btn">⚂ randomise</button>
    </div>
    <button class="continue-btn" id="continue-btn" disabled>Draft Tribes →</button>
  </div>
</div>

<div id="tribes-phase" style="display:none">
  <div class="tribes-layout">
    <div class="tribes-header">
      <div class="tribes-header-left">
        <h1>Tribe Draft</h1>
        <p class="pool-subtitle" id="tribes-subtitle">Drag castaways into their tribes (or randomise)</p>
      </div>
      <div class="tribes-header-actions">
        <button class="action-btn" id="back-cast-btn">← back to cast</button>
        <button class="action-btn" id="randomize-btn">⚂ randomise</button>
        <button class="action-btn" id="share-btn" disabled>Share →</button>
      </div>
    </div>
    <div class="tribe-pool-section">
      <div class="tribe-pool-label">Unassigned <span id="unassigned-count">18</span></div>
      <div class="tribe-pool-grid" id="tribe-pool-grid"></div>
    </div>
    <div class="tribe-columns" id="tribe-columns"></div>
  </div>
</div>

<div id="tag-phase" style="display:none">
  <div class="tribes-layout">
    <div class="tribes-header">
      <div class="tribes-header-left">
        <h1>Tribe Draft</h1>
        <p class="pool-subtitle" id="tag-subtitle">Click a role to assign each castaway</p>
      </div>
      <div class="tribes-header-actions">
        <button class="action-btn" id="tag-back-btn">← back to cast</button>
        <button class="action-btn" id="tag-randomize-btn">⚂ randomise</button>
        <button class="action-btn" id="tag-share-btn" disabled>Share →</button>
      </div>
    </div>
    <div class="tag-tribe-bar" id="tag-tribe-bar"></div>
    <div id="tag-grid"></div>
  </div>
</div>

<div id="share-phase" style="display:none">
  <div class="tribes-layout">
    <div class="tribes-header">
      <div class="tribes-header-left">
        <h1 id="share-title">Survivor: All-Stars</h1>
        <p class="pool-subtitle" id="share-subtitle">Fan cast</p>
      </div>
      <div class="tribes-header-actions">
        <button class="action-btn" id="back-tribes-btn">← edit tribes</button>
        <button class="action-btn" id="copy-link-btn">⎘ copy link</button>
      </div>
    </div>
    <div class="tribe-columns" id="share-tribe-columns"></div>
    <div style="margin-top: 20px;">
      <button class="reset-btn" id="build-own-btn">Build your own →</button>
    </div>
  </div>
</div>

<div class="nav-wrap"></div>

<script src="seasons-data.js"></script>
<script src="return-seasons-config.js"></script>
<script src="all-stars-data.js"></script>
<script src="../nav.js"></script>
</body>
</html>
