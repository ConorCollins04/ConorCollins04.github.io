<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor Players</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* ── Page header ── */
    .page-header {
      padding: 56px 10vw 36px;
      max-width: 1100px;
    }

    .page-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .page-sub {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Table ── */
    .table-wrap {
      padding: 0 10vw;
      max-width: 1100px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    /* Column widths */
    col.col-season   { width: 180px; }
    col.col-star     { width: auto; }
    col.col-pre      { width: auto; }
    col.col-back     { width: auto; }

    thead th {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
      font-weight: 400;
      text-align: left;
      padding: 0 12px 10px 0;
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child { padding-left: 0; }

    /* Column header icons/labels */
    .col-label { display: flex; align-items: center; gap: 6px; }
    .col-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      font-size: 0.65rem;
      flex-shrink: 0;
    }
    .col-icon.star-icon    { background: rgba(255,210,60,0.18); }
    .col-icon.pre-icon     { background: rgba(80,60,120,0.1); }
    .col-icon.back-icon    { background: rgba(60,160,120,0.12); }

    tbody tr {
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 14px 12px 14px 0;
      vertical-align: middle;
    }
    tbody td:first-child { padding-left: 0; }

    /* Season cell */
    .season-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .season-num {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--faint);
      letter-spacing: 0.06em;
    }

    .season-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    /* Player chip */
    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      line-height: 1;
    }

    .player-chip.star-chip  { border-color: rgba(200,160,0,0.3); background: rgba(255,210,60,0.07); }
    .player-chip.pre-chip   { border-color: var(--border); }
    .player-chip.back-chip  { border-color: rgba(40,140,100,0.25); background: rgba(60,160,120,0.06); }

    .chip-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .star-chip  .chip-dot { background: #c8a000; }
    .pre-chip   .chip-dot { background: var(--faint); }
    .back-chip  .chip-dot { background: #2a9c70; }

    .chip-empty {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--faint);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="page-header">
  <p class="page-label">Survivor · Players</p>
  <h1>Season Players</h1>
  <p class="page-sub">My favourite players, season by season</p>
</div>

<div class="table-wrap">
  <table>
    <colgroup>
      <col class="col-season" />
      <col class="col-star" />
      <col class="col-pre" />
      <col class="col-back" />
    </colgroup>
    <thead>
      <tr>
        <th>Season</th>
        <th>
          <div class="col-label">
            <span class="col-icon star-icon">★</span>
            Star
          </div>
        </th>
        <th>
          <div class="col-label">
            <span class="col-icon pre-icon">◇</span>
            Best pre-merger
          </div>
        </th>
        <th>
          <div class="col-label">
            <span class="col-icon back-icon">↩</span>
            Most want to see return
          </div>
        </th>
      </tr>
    </thead>
    <tbody id="picks-body"></tbody>
  </table>
</div>

<div class="nav-wrap"></div>

<script src="seasons-data.js"></script>
<script src="players-data.js"></script>
<script src="../nav.js"></script>
<script>
  const tbody = document.getElementById('picks-body');

  // Build a lookup from season id → season meta
  const seasonMeta = {};
  SEASONS.forEach(s => { seasonMeta[s.id] = s; });

  PLAYER_PICKS.forEach(pick => {
    const season = seasonMeta[pick.seasonId];
    if (!season) return;

    const seasonNum = String(pick.seasonId).padStart(2, '0');

    function chip(name, type) {
      if (!name) return `<span class="chip-empty">—</span>`;
      return `<span class="player-chip ${type}-chip">
        <span class="chip-dot"></span>${name}
      </span>`;
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="season-cell">
          <span class="season-num">S${seasonNum}</span>
          <span class="season-name">${season.name}</span>
        </div>
      </td>
      <td>${chip(pick.star, 'star')}</td>
      <td>${chip(pick.preMerge, 'pre')}</td>
      <td>${chip(pick.wantBack, 'back')}</td>
    `;
    tbody.appendChild(tr);
  });
</script>
</body>
</html>
