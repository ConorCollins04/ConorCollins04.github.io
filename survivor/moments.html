<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor Moments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../nav.css" />
  <link rel="stylesheet" href="../global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* ── Page header ── */
    .page-header {
      padding: 56px 10vw 40px;
      border-bottom: 1px solid var(--border);
      max-width: 1100px;
    }

    .page-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--slab);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .page-sub {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Accordion ── */
    .seasons {
      max-width: 1100px;
      padding: 0 10vw;
      margin-top: 8px;
    }

    .season {
      border-bottom: 1px solid var(--border);
    }

    .season-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      color: var(--text);
    }

    .season-trigger:hover .season-name { color: var(--text); }

    .season-arrow {
      font-size: 0.6rem;
      color: var(--faint);
      transition: transform 0.2s ease;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .season.open .season-arrow {
      transform: rotate(90deg);
    }

    .season-num {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--faint);
      flex-shrink: 0;
      width: 28px;
    }

    .season-name {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .season-count {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--faint);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── Moments grid ── */
    .moments {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding-bottom: 28px;
    }

    .season.open .moments {
      display: grid;
    }

    /* ── Moment card ── */
    .moment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .moment-card:hover {
      border-color: var(--border-hover);
    }

    .moment-text {
      padding: 16px 18px 14px;
    }

    .moment-quote {
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 8px;
    }

    .moment-attr {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--faint);
    }

    .moment-video {
      width: 100%;
      display: block;
      background: #000;
      max-height: 220px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="page-label">Survivor</div>
    <h1>Memorable Moments</h1>
  </div>

  <div class="seasons" id="seasons"></div>

  <div class="nav-wrap">
    <nav class="nav-pill">
      <a href="../index.html" class="nav-btn">Home</a>
      <a href="../concerts/" class="nav-btn">Concerts</a>
      <a href="../oscars/" class="nav-btn">Oscars</a>
      <div class="nav-group" id="survivor-group">
        <button class="nav-btn" id="survivor-trigger">Survivor</button>
        <div class="nav-flyout" id="survivor-flyout">
          <a href="all-stars.html" class="nav-sub-btn">All-Stars Casting</a>
          <a href="moments.html" class="nav-sub-btn active">Moments</a>
        </div>
      </div>
      <div class="nav-group" id="drag-group">
        <button class="nav-btn" id="drag-trigger">Drag</button>
        <div class="nav-flyout" id="drag-flyout">
          <a href="../drag-race/" class="nav-sub-btn">Drag Race</a>
          <a href="../drag-shows/" class="nav-sub-btn">Live Shows</a>
        </div>
      </div>
    </nav>
  </div>

  <script src="moments-data.js"></script>
  <script>
    function toggle(id) {
      document.getElementById(id).classList.toggle('open');
    }

    const container = document.getElementById('seasons');
    MOMENTS.forEach(season => {
      const id = season.season.toLowerCase();
      const count = season.moments.length;
      const cardsHTML = season.moments.map(m => `
        <div class="moment-card">
          <div class="moment-text">
            <p class="moment-quote">${m.quote}</p>
            <p class="moment-attr">${m.attr} — Ep. ${m.ep}</p>
          </div>
          <video class="moment-video" controls preload="none">
            <source src="${m.video}" type="video/mp4">
          </video>
        </div>`).join('');

      container.insertAdjacentHTML('beforeend', `
        <div class="season" id="${id}">
          <button class="season-trigger" onclick="toggle('${id}')">
            <span class="season-arrow">▶</span>
            <span class="season-num">${season.season}</span>
            <span class="season-name">${season.name}</span>
            <span class="season-count">${count} ${count === 1 ? 'moment' : 'moments'}</span>
          </button>
          <div class="moments">${cardsHTML}</div>
        </div>`);
    });
  </script>

  <script src="../nav.js"></script>

</body>
</html>
